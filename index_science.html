    <style>
        :root { --primary: #4A90E2; --secondary: #50E3C2; --accent: #F5A623; --bg: #F0F7FF; --text: #2C3E50; --success: #7ED321; --danger: #FF5E5E; }
        body { font-family: 'Chalkboard SE', 'Microsoft JhengHei', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; touch-action: manipulation; }
        #game-container { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; text-align: center; }
        
        .zy-word { display: inline-flex; flex-direction: column; align-items: center; vertical-align: bottom; margin: 0 2px; line-height: 1.1; }
        .zy-top { font-size: 0.75rem; color: #888; height: 0.9rem; font-weight: normal; font-family: sans-serif; }
        .zy-bottom { font-size: 1.6rem; font-weight: bold; }
        
        .mission-panel { display: flex; flex-direction: column; gap: 12px; margin: 15px 0; }
        .mission-item { background: white; border-radius: 20px; padding: 15px; border: 3px solid var(--primary); display: flex; align-items: center; justify-content: space-between; text-align: left; cursor: pointer; box-shadow: 0 4px 0 var(--primary); }
        .mission-item:active { transform: translateY(2px); box-shadow: none; }
        .mission-item.mastered { border-color: var(--success); opacity: 0.8; box-shadow: 0 4px 0 var(--success); }
        .check-box { width: 35px; height: 35px; border: 2px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .mission-item.mastered .check-box { background: var(--success); color: white; border-color: var(--success); }

        .game-screen { display: none; }
        .game-screen.active { display: block; }
        
        .question-box { background: white; border-radius: 30px; padding: 25px; margin: 15px 0; box-shadow: 0 10px 20px rgba(0,0,0,0.05); min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .opt-btn { background: var(--primary); color: white; border: none; border-radius: 18px; padding: 15px; font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 0 #357ABD; min-height: 50px; }
        .opt-btn:active { transform: translateY(4px); box-shadow: none; }

        ],
        nature: [
            { q: "下列哪種介質中，聲音的傳播速度『最快』？", a: "固體", o: ["固體", "液體", "氣體", "真空"] },
            { q: "光從空氣進入水中會產生偏折，這種現象稱為？", a: "折射", o: ["折射", "反射", "直進", "吸收"] },
            { q: "影響水蒸發速度的因素不包括？", a: "容器的顏色", o: ["容器的顏色", "溫度的高低", "風速的大小", "表面積的大小"] },
            { q: "彩虹的形成主要是光的什麼現象？", a: "折射與反射", o: ["折射與反射", "直線傳播", "光線遮擋", "影子變化"] },
            { q: "聲音是如何產生的？", a: "物體振動", o: ["物體振動", "光線照射", "化學反應", "溫度升高"] },
            { q: "形成影子需要哪些條件？", a: "光源、物體遮擋、屏幕", o: ["光源、物體遮擋、屏幕", "水、鏡子、陽光", "高溫、空氣、水分", "聲音、介質、物體"] },
            { q: "同溫水一杯放陽光下、一杯放陰影下，哪杯蒸發較快？", a: "陽光下較快", o: ["陽光下較快", "陰影下較快", "一樣快", "都不會蒸發"] },
            { q: "同溫水一杯放在寬口盤子，一杯放窄口杯子，哪杯蒸發較快？", a: "寬口盤子較快", o: ["寬口盤子較快", "窄口杯子較快", "一樣快", "都不會蒸發"] },
            { q: "水循環的三個主要過程是什麼？", a: "蒸發、凝結、降水", o: ["蒸發、凝結、降水", "流動、沸騰、融化", "吸收、反射、折射", "生鏽、燃燒、分解"] },
            { q: "為什麼鹽水比清水不容易蒸發？", a: "鹽降低了水分子逃離表面的速度", o: ["鹽降低了水分子逃離表面的速度", "鹽會吸收空氣中的水", "鹽讓水的溫度降低", "鹽會發熱"] },
            { q: "光反射時，入射角和反射角的關係是什麼？", a: "入射角等於反射角", o: ["入射角等於反射角", "入射角大於反射角", "入射角小於反射角", "沒有一定關係"] },
            { q: "站在岸邊看水中的魚，魚看起來比實際位置淺還是深？", a: "淺", o: ["淺", "深", "一樣深", "會變大"] },
            { q: "台灣的颱風季節主要在哪幾個月？", a: "夏秋季（約7到9月）", o: ["夏秋季（約7到9月）", "冬季（12到2月）", "春季（3到5月）", "全年都有"] }
        ]
    };

    let roundState;
    try {
        roundState = JSON.parse(localStorage.getItem('bobo_science_round')) || null;
    } catch (e) {
        roundState = null;
    }
    
    if (!roundState) {
        roundState = {
            completedUnits: [],
            unitQueue: ALL_UNITS.map(u => u.id),
            mistakes: []
        };
    }

    let currentUnit = null, currentStep = 0, correctAnswer = null, isProcessingAnswer = false;
    let challengeStartTime = null;
    let currentQuestionText = "";
    let sessionMistakes = [];

    function initPage() {
        const config = JSON.parse(localStorage.getItem('bobo_tg_config') || '{}');
        if (!config.token) {
            const defaultConfig = {
                token: "8737495847:AAF0UODT6S4MLFnPUpx5lnZCaM0iDK5Sefc",
                chatid: "-5062576908"
            };
            localStorage.setItem('bobo_tg_config', JSON.stringify(defaultConfig));
        }
        renderMissions();
        loadTgConfig();
    }

    function toggleTgConfig() {
        const panel = document.getElementById('tg-config-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function saveTgConfig() {
        const config = {
            token: document.getElementById('tg-token').value,
            chatid: document.getElementById('tg-chatid').value
        };
        localStorage.setItem('bobo_tg_config', JSON.stringify(config));
    }

    function loadTgConfig() {
        const config = JSON.parse(localStorage.getItem('bobo_tg_config') || '{}');
        if (config.token) document.getElementById('tg-token').value = config.token;
        if (config.chatid) document.getElementById('tg-chatid').value = config.chatid;
    }

    function renderMissions() {
        const list = document.getElementById('mission-list');
        list.innerHTML = ALL_UNITS.map(u => {
            const isMastered = roundState.completedUnits.includes(u.id);
            return `
            <div class="mission-item ${isMastered?'mastered':''}" onclick="startUnit('${u.id}')">
                <div>
                    <div style="font-size:1.3rem">${u.title}</div>
                    <div style="font-size:0.8rem; color:#888;">${u.text}</div>
                </div>
                <div class="check-box">${isMastered?'✓':''}</div>
            </div>`;
        }).join('');
    }

    function startUnit(unitId) {
        currentUnit = ALL_UNITS.find(u => u.id === unitId);
        document.getElementById('menu').classList.remove('active');
        document.getElementById('teaching-screen').classList.add('active');
        document.getElementById('teaching-title').innerHTML = currentUnit.title;
        const randomTeaching = currentUnit.teaching[Math.floor(Math.random() * currentUnit.teaching.length)];
        document.getElementById('teaching-body').innerText = randomTeaching;
        speak("Bobo妳好，" + randomTeaching);
    }

    function startChallenge() {
        currentStep = 0;
        sessionMistakes = [];
        challengeStartTime = new Date();
        document.getElementById('teaching-screen').classList.remove('active');
        document.getElementById('game').classList.add('active');
        document.getElementById('mode-title').innerHTML = currentUnit.title;
        updateStars(); 
        generateQuestion();
    }

    function generateQuestion() {
        isProcessingAnswer = false;
        const qEl = document.getElementById('question');
        const oEl = document.getElementById('options');
        qEl.innerHTML = '';
        oEl.innerHTML = '';

        const bank = QUESTION_BANK[currentUnit.id];
        const qData = bank[Math.floor(Math.random() * bank.length)];
        
        currentQuestionText = qData.q;
        correctAnswer = qData.a;
        qEl.innerText = qData.q;

        const shuffledOptions = [...qData.o].sort(() => 0.5 - Math.random());
        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt);
            oEl.appendChild(btn);
        });
    }

    function checkAnswer(val) {
        if (isProcessingAnswer) return;
        isProcessingAnswer = true;

        if (val === correctAnswer) {
            currentStep++;
            updateStars();
            confetti({ particleCount: 50, spread: 40, origin: { y: 0.8 } });
            speak(["答對了！太聰明了！", "好厲害喔！", "正確答案！"][Math.floor(Math.random()*3)]);
            
            if (currentStep >= 10) {
                const duration = Math.floor((new Date() - challengeStartTime) / 1000);
                const phoneTime = Math.floor(duration / 30) + 5; 
                
                if (!roundState.completedUnits.includes(currentUnit.id)) {
                    roundState.completedUnits.push(currentUnit.id);
                    localStorage.setItem('bobo_science_round', JSON.stringify(roundState));
                }

                document.getElementById('time-reward').innerText = `🎁 獲得 ${phoneTime} 分鐘玩手機時間！`;
                sendTgNotification(currentUnit.title.replace(/<[^>]*>/g, ''), duration, phoneTime);
                setTimeout(showReward, 1000);
            } else { 
                setTimeout(generateQuestion, 1000); 
            }
        } else {
            sessionMistakes.push({ q: currentQuestionText, wrong: val, correct: correctAnswer });
            currentStep = 0;
            updateStars();
            speak("沒關係，再想一下喔！燈滅了，我們要重新挑戰 10 題了！");
            document.getElementById('question').style.background = '#FFEBEB';
            setTimeout(() => { 
                document.getElementById('question').style.background = 'white'; 
                isProcessingAnswer = false;
            }, 500);
        }
    }

    async function sendTgNotification(unitTitle, duration, phoneTime) {
        const config = JSON.parse(localStorage.getItem('bobo_tg_config') || '{}');
        if (!config.token || !config.chatid) return;

        let mistakeText = "";
        if (sessionMistakes.length > 0) {
            mistakeText = "\n\n❌ **本次錯題紀錄：**\n";
            sessionMistakes.forEach((m, i) => {
                mistakeText += `${i+1}. 題目：${m.q}\n   Bobo答：${m.wrong} (正解：${m.correct})\n`;
            });
        }

        const message = `🌟 Bobo 自然挑戰成功！\n\n` +
                        `📚 單元：${unitTitle}\n` +
                        `⏱️ 耗時：${duration} 秒\n` +
                        `🎯 通關要求：10 題連對\n` +
                        `📱 獎勵手機時間：${phoneTime} 分鐘` +
                        mistakeText + 
                        `\nBobo 表現優異，繼續加油！🔬`;

        const url = `https://api.telegram.org/bot${config.token}/sendMessage`;
        try {
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: config.chatid, text: message, parse_mode: "Markdown" })
            });
        } catch (e) { console.error("TG Notification failed", e); }
    }

    function showHint() {
        const hint = `這題考的是我們剛才在單元裡學過的觀念喔！再仔細讀一下題目。`;
        speak(hint);
        alert(hint);
    }

    function speak(t) { 
        if(window.speechSynthesis) { 
            window.speechSynthesis.cancel(); 
            const u = new SpeechSynthesisUtterance(t); 
            u.lang='zh-TW'; 
            u.rate=0.9;
            window.speechSynthesis.speak(u); 
        } 
    }

    function speakCurrentQuestion() {
        speak(document.getElementById('question').innerText);
    }

    function updateStars() { 
        document.getElementById('stars').innerText = '⭐'.repeat(currentStep) + '⚪'.repeat(10 - currentStep); 
    }

    function goHome() {
        document.getElementById('game').classList.remove('active');
        document.getElementById('teaching-screen').classList.remove('active');
        document.getElementById('menu').classList.add('active');
        renderMissions();
    }

    function showReward() { 
        document.getElementById('reward-screen').classList.add('active'); 
        confetti({ particleCount: 500, spread: 120 }); 
    }

    function resetRoundAndReload() {
        document.getElementById('reward-screen').classList.remove('active');
        goHome();
    }

    function resetData() { 
        if(confirm("確定要清除 Bobo 的紀錄嗎？")) { 
            localStorage.removeItem('bobo_science_round');
            location.reload(); 
        } 
    }

    function downloadReport() {
        let md = "# 🔬 Bobo 自然冒險學習報表\n\n";
        md += `目前完成單元：${roundState.completedUnits.length} / ${ALL_UNITS.length}\n`;
        roundState.completedUnits.forEach(id => {
            const u = ALL_UNITS.find(x => x.id === id);
            md += `- ✅ ${u.title.replace(/<[^>]*>/g, '')}\n`;
        });
        const blob = new Blob([md], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Bobo自然學習報表.md';
        a.click();
    }

    window.onload = initPage;
</script>

</body>
</html>
