<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bobo 數學畢業考練習</title>
  <style>
    :root {
      --ink: #17212b;
      --muted: #5d6a75;
      --paper: #fffdf8;
      --line: #d8e1e6;
      --teal: #0f8b8d;
      --green: #4f8f3a;
      --gold: #d99b25;
      --rose: #c84f5f;
      --blue: #2e6f9e;
      --soft-teal: #e7f5f3;
      --soft-gold: #fff3d9;
      --soft-rose: #fdecef;
      --soft-blue: #edf4fa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,253,248,.96), rgba(239,246,244,.96)),
        repeating-linear-gradient(90deg, rgba(15,139,141,.06) 0 1px, transparent 1px 44px);
    }

    button, input, select { font: inherit; }

    .app-shell {
      width: min(1040px, 100%);
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 0 14px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.65rem, 5vw, 2.6rem);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
      min-height: 40px;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
    }

    .btn:hover { transform: translateY(-1px); border-color: var(--teal); }
    .btn.primary { background: var(--teal); color: white; border-color: var(--teal); }
    .btn.warn { background: var(--soft-rose); border-color: #efb4bd; color: #842b38; }
    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
      padding-top: 18px;
    }

    .panel {
      background: rgba(255,255,255,.84);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 8px 22px rgba(23,33,43,.06);
    }

    .side {
      position: sticky;
      top: 14px;
      align-self: start;
    }

    .scope-title {
      margin: 0 0 10px;
      font-size: 1.05rem;
    }

    .unit-list {
      display: grid;
      gap: 8px;
    }

    .unit-btn {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      padding: 10px;
      text-align: left;
      cursor: pointer;
    }

    .unit-btn.active { border-color: var(--teal); background: var(--soft-teal); }
    .unit-btn .dot { width: 10px; height: 10px; border-radius: 99px; background: var(--teal); }
    .unit-btn:nth-child(2n) .dot { background: var(--gold); }
    .unit-btn:nth-child(3n) .dot { background: var(--blue); }
    .unit-count { color: var(--muted); font-size: .86rem; white-space: nowrap; }

    .progress {
      margin-top: 14px;
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: .95rem;
    }

    .bar {
      height: 10px;
      background: #edf1f2;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar > span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--teal));
      transition: width .25s ease;
    }

    .exam-card {
      display: grid;
      gap: 14px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: .95rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      background: white;
      color: var(--muted);
      font-size: .9rem;
    }

    .question {
      padding: 18px;
      background: var(--paper);
      border: 1px solid #eadfcb;
      border-radius: 8px;
    }

    .question h2 {
      margin: 0 0 10px;
      font-size: clamp(1.22rem, 4vw, 1.72rem);
      line-height: 1.5;
      letter-spacing: 0;
    }

    .question-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .workbox {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px dashed #bdcbd2;
      background: white;
      border-radius: 8px;
      color: var(--muted);
      line-height: 1.55;
    }

    .visual {
      margin-top: 12px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      overflow: auto;
    }

    .concept-card {
      display: grid;
      gap: 12px;
      padding: 16px;
      border: 1px solid #bcd9dc;
      border-radius: 8px;
      background: var(--soft-teal);
      line-height: 1.7;
    }

    .concept-card h2 {
      margin: 0;
      font-size: clamp(1.25rem, 4vw, 1.8rem);
    }

    .concept-card strong { color: #0b6668; }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .option {
      display: flex;
      align-items: center;
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      padding: 12px;
      text-align: left;
      cursor: pointer;
      line-height: 1.35;
    }

    .option:hover { border-color: var(--teal); background: var(--soft-teal); }
    .option.correct { border-color: var(--green); background: #edf7e9; }
    .option.wrong { border-color: var(--rose); background: var(--soft-rose); }

    .feedback {
      display: none;
      border-radius: 8px;
      padding: 14px;
      line-height: 1.7;
      border: 1px solid var(--line);
      background: white;
    }

    .feedback.show { display: block; }
    .feedback.ok { border-color: #a8d49b; background: #f1faee; }
    .feedback.bad { border-color: #efb4bd; background: #fff4f5; }

    .explain-title {
      margin: 0 0 6px;
      font-weight: 700;
    }

    .step-list {
      margin: 8px 0 0;
      padding-left: 1.25rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
    }

    .mini-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .report {
      display: none;
      white-space: pre-wrap;
      line-height: 1.65;
      background: #f7faf9;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      color: var(--ink);
    }

    .report.show { display: block; }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: white;
    }

    svg { max-width: 100%; height: auto; }

    @media (max-width: 760px) {
      .app-shell { padding: 14px; }
      .topbar { display: grid; }
      .actions { justify-content: flex-start; }
      .layout { grid-template-columns: 1fr; }
      .side { position: static; }
      .options { grid-template-columns: 1fr; }
      .status-row { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>Bobo 數學畢業考練習</h1>
        <p class="subtitle">康軒六下範圍：第 5 單元怎樣解題、第 6 單元圓形圖。先練畢業考常考的解題模型、圓形百分圖、圓形圖應用和可能性。</p>
      </div>
      <div class="actions">
        <button class="btn primary" id="startMixedBtn">開始混合練習</button>
        <button class="btn" id="wrongBtn">錯題加強</button>
        <button class="btn warn" id="resetBtn">清除本機紀錄</button>
      </div>
    </header>

    <section class="layout">
      <aside class="panel side">
        <h2 class="scope-title">畢業考範圍</h2>
        <div class="unit-list" id="unitList"></div>
        <div class="progress">
          <div id="progressText">完成 0 / 0 題</div>
          <div class="bar"><span id="progressBar"></span></div>
          <div id="accuracyText">答對率 0%</div>
          <div id="wrongText">待加強 0 題</div>
        </div>
      </aside>

      <section class="panel exam-card">
        <div class="status-row">
          <span class="pill" id="modeLabel">請選一個單元，或開始混合練習</span>
          <span id="queueLabel">題庫已載入</span>
        </div>

        <div id="questionArea" class="empty">選擇單元後會從概念卡開始，答錯會立刻留下錯題紀錄。</div>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback"></div>

        <div class="toolbar">
          <div class="mini-actions">
            <button class="btn" id="hintBtn" disabled>看提示</button>
            <button class="btn" id="nextBtn" disabled>下一題</button>
            <button class="btn" id="reportBtn">產生回報</button>
          </div>
          <div class="mini-actions">
            <button class="btn" id="shuffleBtn">換一輪順序</button>
          </div>
        </div>

        <pre class="report" id="reportBox"></pre>
      </section>
    </section>
  </main>

        percentPie: "圓形百分圖把全部看成 100%。求部分就用全部 × 百分率；求圓心角就用 360 度 × 百分率。",
        pieChart: "圓形圖把一整個圓看成 360 度。角度 ÷ 360 可以換成比例，再乘總量就能求人數或數量。",
        pieApply: "圓形圖應用題常先比較百分率或角度差，再乘總量。遇到「其餘」要先用全部扣掉已知部分。",
        probability: "可能性 = 符合條件的結果數 ÷ 全部結果數。先數清楚總共有幾個，再數想要的結果有幾個。"
      };
      return map[unitId] || "先看懂題目在問哪個量，再決定用哪個模型。";
    }

    function conceptDiagram(unitId) {
      const diagrams = {
        sumdiff: `<svg viewBox="0 0 320 130" role="img" aria-label="和差問題圖解"><rect x="28" y="28" width="210" height="28" rx="6" fill="#0f8b8d"/><rect x="28" y="78" width="146" height="28" rx="6" fill="#d99b25"/><line x1="174" y1="92" x2="238" y2="42" stroke="#c84f5f" stroke-width="3"/><text x="246" y="47" font-size="15">差</text><text x="118" y="22" font-size="15">大數</text><text x="92" y="122" font-size="15">小數</text></svg>`,
        age: `<svg viewBox="0 0 320 130" role="img" aria-label="年齡差固定"><line x1="40" y1="45" x2="280" y2="45" stroke="#0f8b8d" stroke-width="8" stroke-linecap="round"/><line x1="80" y1="86" x2="280" y2="86" stroke="#d99b25" stroke-width="8" stroke-linecap="round"/><line x1="80" y1="20" x2="80" y2="106" stroke="#c84f5f" stroke-width="3"/><line x1="280" y1="20" x2="280" y2="106" stroke="#c84f5f" stroke-width="3"/><text x="120" y="28" font-size="15">幾年前/後一起移動</text><text x="132" y="120" font-size="15">年齡差不變</text></svg>`,
        chicken: `<svg viewBox="0 0 320 130" role="img" aria-label="雞兔問題假設法"><text x="28" y="34" font-size="16">全部先當 2 隻腳</text><circle cx="70" cy="70" r="18" fill="#d99b25"/><circle cx="130" cy="70" r="18" fill="#d99b25"/><circle cx="190" cy="70" r="18" fill="#d99b25"/><path d="M230 70h48" stroke="#c84f5f" stroke-width="4"/><text x="230" y="102" font-size="15">多 2 腳 = 1 隻兔</text></svg>`,
        combination: `<svg viewBox="0 0 320 130" role="img" aria-label="組合樹狀圖"><circle cx="55" cy="65" r="16" fill="#0f8b8d"/><circle cx="155" cy="35" r="16" fill="#d99b25"/><circle cx="155" cy="95" r="16" fill="#d99b25"/><circle cx="255" cy="20" r="14" fill="#2e6f9e"/><circle cx="255" cy="50" r="14" fill="#2e6f9e"/><circle cx="255" cy="80" r="14" fill="#2e6f9e"/><circle cx="255" cy="110" r="14" fill="#2e6f9e"/><path d="M70 60L140 38M70 70L140 92M170 35L242 20M170 35L242 50M170 95L242 80M170 95L242 110" stroke="#7d8b93" stroke-width="2"/><text x="24" y="118" font-size="15">分階段選，用乘法</text></svg>`,
        percentPie: `<svg viewBox="0 0 320 130" role="img" aria-label="百分圖"><circle cx="82" cy="66" r="46" fill="#d8e1e6"/><path d="M82 66 L82 20 A46 46 0 0 1 128 66 Z" fill="#0f8b8d"/><text x="160" y="55" font-size="16">100% = 全部</text><text x="160" y="82" font-size="16">部分 = 全部 × 百分率</text></svg>`,
        pieChart: `<svg viewBox="0 0 320 130" role="img" aria-label="圓形圖角度"><circle cx="82" cy="66" r="46" fill="#d8e1e6"/><path d="M82 66 L82 20 A46 46 0 0 1 128 66 Z" fill="#d99b25"/><text x="58" y="72" font-size="14">360度</text><text x="154" y="58" font-size="16">比例 = 角度 ÷ 360</text><text x="154" y="86" font-size="16">數量 = 全部 × 比例</text></svg>`,
        pieApply: `<svg viewBox="0 0 320 130" role="img" aria-label="圓形圖應用"><rect x="36" y="28" width="70" height="70" fill="#0f8b8d"/><rect x="126" y="28" width="100" height="70" fill="#d99b25"/><path d="M106 110H226" stroke="#c84f5f" stroke-width="4"/><text x="70" y="122" font-size="15">比較差量，再乘總量</text></svg>`,
        probability: `<svg viewBox="0 0 320 130" role="img" aria-label="可能性"><circle cx="58" cy="50" r="15" fill="#c84f5f"/><circle cx="98" cy="50" r="15" fill="#c84f5f"/><circle cx="138" cy="50" r="15" fill="#2e6f9e"/><circle cx="178" cy="50" r="15" fill="#d99b25"/><circle cx="218" cy="50" r="15" fill="#d99b25"/><text x="52" y="100" font-size="16">可能性 = 想要的數量 ÷ 全部數量</text></svg>`
      };
      return diagrams[unitId] || "";
    }

    function unitOverviewCard(unitId) {
      const unit = unitInfo(unitId);
      return {
        type: "concept",
        id: `overview-${unitId}`,
        unit: unitId,
        conceptIndex: 1,
        conceptTotal: 1,
        title: `${unit.label} 概念卡`,
        text: conceptExplanation(unitId),
        cardKind: "單元開始"
      };
    }

    function buildMistakeReviewQueue(bank) {
      const groups = [];
      const byConcept = new Map();
      bank.forEach(item => {
        if (!byConcept.has(item.unit)) {
          byConcept.set(item.unit, []);
          groups.push({ unit: item.unit, items: byConcept.get(item.unit) });
        }
        byConcept.get(item.unit).push(item);
      });
      return groups.flatMap((group, groupIndex) => {
        const conceptCard = {
          type: "concept",
          id: `concept-${group.unit}-${groupIndex}`,
          unit: group.unit,
          conceptIndex: groupIndex + 1,
          conceptTotal: groups.length,
          title: `${unitInfo(group.unit).label} 觀念加強`,
          text: conceptExplanation(group.unit),
          cardKind: "錯題觀念"
        };
        const originals = group.items.map(item => ({ ...item, reviewKind: "原錯題" }));
        const variations = group.items.flatMap(item => variationQuestions(item).map((v, index) => ({
          ...v,
          reviewKind: `變化題 ${index + 1}`,
          sourceOriginal: item.id
        })));
        return [conceptCard, ...originals, ...variations];
      });
    }

    function variationQuestions(item) {
      return byUnit(item.unit)
        .filter(q => q.id !== item.id)
        .slice(0, 2)
        .map(q => ({ ...q, id: `${item.id}-var-${q.id}`, originalId: item.id }));
    }

    function renderUnits(activeId = "") {
      unitList.innerHTML = "";
      UNITS.forEach(unit => {
        const count = byUnit(unit.id).length;
        const btn = document.createElement("button");
        btn.className = "unit-btn" + (activeId === unit.id ? " active" : "");
        btn.innerHTML = `<span class="dot"></span><span>${unit.label}<br><small>${unit.group}</small></span><span class="unit-count">${count} 題</span>`;
        btn.addEventListener("click", () => startMode("unit", unit.id));
        unitList.appendChild(btn);
      });
    }

    function startMode(mode, unitId = "") {
      currentMode = mode;
      reportBox.classList.remove("show");
      feedbackEl.className = "feedback";
      feedbackEl.innerHTML = "";
      answered = false;
      currentWrongRecorded = false;
      currentHintUsed = false;

      if (mode === "unit") {
        currentQueue = [unitOverviewCard(unitId), ...shuffle(byUnit(unitId))];
        modeLabel.textContent = unitInfo(unitId).label;
        renderUnits(unitId);
      } else if (mode === "wrong") {
        const wrongIds = Object.keys(state.wrong).filter(id => state.wrong[id]);
        currentQueue = buildMistakeReviewQueue(QUESTION_BANK.filter(q => wrongIds.includes(q.id)));
        modeLabel.textContent = "錯題加強";
        renderUnits();
      } else {
        currentQueue = UNITS.flatMap(unit => [unitOverviewCard(unit.id), ...shuffle(byUnit(unit.id))]);
        modeLabel.textContent = "畢業考混合練習";
        renderUnits();
      }

      currentIndex = -1;
      if (currentQueue.length === 0) {
        questionArea.className = "empty";
        questionArea.textContent = mode === "wrong" ? "目前沒有待加強錯題。可以先做混合練習。" : "這個範圍目前沒有題目。";
        optionsEl.innerHTML = "";
        hintBtn.disabled = true;
        nextBtn.disabled = true;
        queueLabel.textContent = "0 題";
        return;
      }
      nextQuestion();
    }

    function nextQuestion() {
      currentIndex += 1;
      if (currentIndex >= currentQueue.length) {
        questionArea.className = "empty";
        questionArea.innerHTML = "這一輪完成了。可以產生回報，或再換一輪順序。";
        optionsEl.innerHTML = "";
        feedbackEl.className = "feedback";
        hintBtn.disabled = true;
        nextBtn.disabled = true;
        queueLabel.textContent = `完成 ${currentQueue.length} 題`;
        updateProgress();
        return;
      }

      currentQuestion = currentQueue[currentIndex];
      answered = false;
      currentWrongRecorded = false;
      currentHintUsed = false;
      renderQuestion(currentQuestion);
      queueLabel.textContent = `${currentIndex + 1} / ${currentQueue.length}`;
      hintBtn.disabled = currentQuestion.type === "concept";
      nextBtn.disabled = currentQuestion.type !== "concept";
    }

    function renderQuestion(q) {
      if (q.type === "concept") {
        const unit = unitInfo(q.unit);
        questionArea.className = "question";
        questionArea.innerHTML = `
          <div class="question-meta">
            <span class="pill">${q.cardKind || "概念卡"}</span>
            <span class="pill">${unit.group}</span>
            <span class="pill">觀念 ${q.conceptIndex} / ${q.conceptTotal}</span>
          </div>
          <div class="concept-card">
            ${conceptDiagram(q.unit)}
            <h2>${q.title}</h2>
            <div><strong>先看懂再作答：</strong>${q.text}</div>
          </div>
        `;
        optionsEl.innerHTML = "";
        feedbackEl.className = "feedback show";
        feedbackEl.innerHTML = "看完概念卡後，按「下一題」開始練習。";
        return;
      }

      const unit = unitInfo(q.unit);
      questionArea.className = "question";
      questionArea.innerHTML = `
        <div class="question-meta">
          <span class="pill">${unit.label}</span>
          <span class="pill">${q.level}</span>
          ${q.source ? `<span class="pill">${q.source}</span>` : ""}
          ${q.reviewKind ? `<span class="pill">${q.reviewKind}</span>` : ""}
        </div>
        <h2>${q.title}</h2>
        <div class="workbox">${q.work}</div>
        ${renderVisual(q.visual)}
      `;

      optionsEl.innerHTML = "";
      q.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.textContent = `${String.fromCharCode(65 + index)}. ${option}`;
        btn.addEventListener("click", () => chooseAnswer(index, btn));
        optionsEl.appendChild(btn);
      });

      feedbackEl.className = "feedback";
      feedbackEl.innerHTML = "";
    }

    function renderVisual(type) {
      if (type === "percent25") {
        return `<div class="visual">${pieSvg([25, 75], ["#0f8b8d", "#d8e1e6"], ["25%", "75%"])}</div>`;
      }
      if (type === "angle72") {
        return `<div class="visual">${pieSvg([20, 80], ["#d99b25", "#d8e1e6"], ["72度", "其餘"])}</div>`;
      }
      return "";
    }

    function pieSvg(values, colors, labels) {
      let start = -90;
      const slices = values.map((value, i) => {
        const angle = value / 100 * 360;
        const path = describeArc(100, 100, 82, start, start + angle);
        const mid = start + angle / 2;
        const labelPoint = polarToCartesian(100, 100, 48, mid);
        start += angle;
        return `<path d="${path}" fill="${colors[i]}" stroke="#fff" stroke-width="2"></path>
          <text x="${labelPoint.x}" y="${labelPoint.y}" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="700" fill="#17212b">${labels[i]}</text>`;
      }).join("");
      return `<svg viewBox="0 0 200 200" width="220" role="img" aria-label="圓形圖">${slices}<circle cx="100" cy="100" r="82" fill="none" stroke="#aebbc2" stroke-width="1"></circle></svg>`;
    }

    function polarToCartesian(cx, cy, r, angle) {
      const rad = angle * Math.PI / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }

    function describeArc(cx, cy, r, startAngle, endAngle) {
      const start = polarToCartesian(cx, cy, r, endAngle);
      const end = polarToCartesian(cx, cy, r, startAngle);
      const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
      return `M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${largeArcFlag} 0 ${end.x} ${end.y} Z`;
    }

    function chooseAnswer(index, btn) {
      if (answered || !currentQuestion) return;

      const q = currentQuestion;
      const ok = index === q.answer;
      state.attempts[q.id] = state.attempts[q.id] || { tries: 0, correct: 0, unit: q.unit };
      state.attempts[q.id].tries += 1;
      if (ok) {
        answered = true;
        if (!currentHintUsed) {
          state.attempts[q.id].correct += 1;
          state.completed[q.id] = true;
          if (currentMode === "wrong" && !currentWrongRecorded && !q.originalId) delete state.wrong[q.id];
          if (currentMode === "wrong" && !currentWrongRecorded && q.sourceOriginal) {
            const original = QUESTION_BANK.find(item => item.id === q.sourceOriginal);
            if (original) delete state.wrong[original.id];
          }
        } else if (!q.originalId) {
          state.wrong[q.id] = true;
          state.history[q.id] = {
            id: q.id,
            unit: q.unit,
            title: q.title,
            correct: q.options[q.answer],
            missedAt: new Date().toISOString(),
            status: "hint_used"
          };
        }
        [...optionsEl.children].forEach((optionEl, optionIndex) => {
          optionEl.disabled = true;
          if (optionIndex === q.answer) optionEl.classList.add("correct");
        });
        feedbackEl.className = "feedback show ok";
        feedbackEl.innerHTML = `
          <p class="explain-title">${currentHintUsed ? "提示後答對，先留在待加強" : "答對了"}</p>
          ${currentHintUsed ? "<div>這題有看提示，所以不算精熟；之後錯題加強會再練一次。</div>" : ""}
          <div>答案：${q.options[q.answer]}</div>
          <ol class="step-list">${q.steps.map(step => `<li>${step}</li>`).join("")}</ol>
        `;
        hintBtn.disabled = true;
        nextBtn.disabled = false;
      } else {
        if (!currentWrongRecorded && !q.originalId) {
          state.wrong[q.id] = true;
          state.history[q.id] = {
            id: q.id,
            unit: q.unit,
            title: q.title,
            correct: q.options[q.answer],
            missedAt: new Date().toISOString(),
            status: "active"
          };
          currentWrongRecorded = true;
        }
        btn.classList.add("wrong");
        btn.disabled = true;
        feedbackEl.className = "feedback show bad";
        feedbackEl.innerHTML = `
          <p class="explain-title">先記成待加強，這題再試一次</p>
          <div>${q.hint}</div>
        `;
        hintBtn.disabled = false;
        nextBtn.disabled = true;
      }
      saveState();
      updateProgress();
    }

    function showHint() {
      if (!currentQuestion || answered || currentQuestion.type === "concept") return;
      currentHintUsed = true;
      feedbackEl.className = "feedback show";
      feedbackEl.innerHTML = `<p class="explain-title">提示</p><div>${currentQuestion.hint}</div>`;
    }

    function updateProgress() {
      const total = QUESTION_BANK.length;
      const attempts = Object.values(state.attempts);
      const completed = QUESTION_BANK.filter(q => state.completed[q.id]).length;
      const tries = attempts.reduce((sum, item) => sum + item.tries, 0);
      const correct = attempts.reduce((sum, item) => sum + item.correct, 0);
      const wrongCount = Object.keys(state.wrong).filter(id => state.wrong[id]).length;
      const rate = tries ? Math.round(correct / tries * 100) : 0;
      document.getElementById("progressText").textContent = `完成 ${completed} / ${total} 題`;
      document.getElementById("progressBar").style.width = `${Math.round(completed / total * 100)}%`;
      document.getElementById("accuracyText").textContent = `答對率 ${rate}%`;
      document.getElementById("wrongText").textContent = `待加強 ${wrongCount} 題`;
    }

    function showReport() {
      const unitLines = UNITS.map(unit => {
        const questions = byUnit(unit.id);
        const done = questions.filter(q => state.completed[q.id]).length;
        const wrong = questions.filter(q => state.wrong[q.id]).length;
        return `${unit.label}：完成 ${done}/${questions.length}，待加強 ${wrong}`;
      });
      const wrongItems = QUESTION_BANK
        .filter(q => state.wrong[q.id])
        .map(q => `- ${UNITS.find(u => u.id === q.unit).label}：${q.title}`)
        .join("\n") || "目前沒有錯題。";

      reportBox.textContent = [
        "Bobo 數學畢業考練習回報",
        `時間：${new Date().toLocaleString("zh-TW")}`,
        "",
        "範圍：康軒六下第 5 單元怎樣解題、第 6 單元圓形圖",
        "",
        unitLines.join("\n"),
        "",
        "待加強題目：",
        wrongItems
      ].join("\n");
      reportBox.classList.add("show");
    }

    function resetProgress() {
      const ok = confirm("確定要清除這台裝置上的畢業考練習紀錄嗎？");
      if (!ok) return;
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }

    function shuffle(items) {
      for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      return items;
    }
  </script>
