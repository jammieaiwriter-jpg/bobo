<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bobo 數學畢業考練習</title>
  <style>
    :root {
      --ink: #17212b;
      --muted: #5d6a75;
      --paper: #fffdf8;
      --line: #d8e1e6;
      --teal: #0f8b8d;
      --green: #4f8f3a;
      --gold: #d99b25;
      --rose: #c84f5f;
      --blue: #2e6f9e;
      --soft-teal: #e7f5f3;
      --soft-gold: #fff3d9;
      --soft-rose: #fdecef;
      --soft-blue: #edf4fa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,253,248,.96), rgba(239,246,244,.96)),
        repeating-linear-gradient(90deg, rgba(15,139,141,.06) 0 1px, transparent 1px 44px);
    }

    button, input, select { font: inherit; }
    textarea { font: inherit; }

    .app-shell {
      width: min(1040px, 100%);
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 0 14px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.65rem, 5vw, 2.6rem);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
      min-height: 40px;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
    }

    .btn:hover { transform: translateY(-1px); border-color: var(--teal); }
    .btn.primary { background: var(--teal); color: white; border-color: var(--teal); }
    .btn.warn { background: var(--soft-rose); border-color: #efb4bd; color: #842b38; }
    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
      padding-top: 18px;
    }

    .panel {
      background: rgba(255,255,255,.84);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 8px 22px rgba(23,33,43,.06);
    }

    .side {
      position: sticky;
      top: 14px;
      align-self: start;
    }

    .scope-title {
      margin: 0 0 10px;
      font-size: 1.05rem;
    }

    .unit-list {
      display: grid;
      gap: 8px;
    }

    .unit-btn {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      padding: 10px;
      text-align: left;
      cursor: pointer;
    }

    .unit-btn.active { border-color: var(--teal); background: var(--soft-teal); }
    .unit-btn .dot { width: 10px; height: 10px; border-radius: 99px; background: var(--teal); }
    .unit-btn:nth-child(2n) .dot { background: var(--gold); }
    .unit-btn:nth-child(3n) .dot { background: var(--blue); }
    .unit-count { color: var(--muted); font-size: .86rem; white-space: nowrap; }

    .progress {
      margin-top: 14px;
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: .95rem;
    }

    .bar {
      height: 10px;
      background: #edf1f2;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar > span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--teal));
      transition: width .25s ease;
    }

    .exam-card {
      display: grid;
      gap: 14px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: .95rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      background: white;
      color: var(--muted);
      font-size: .9rem;
    }

    .question {
      padding: 18px;
      background: var(--paper);
      border: 1px solid #eadfcb;
      border-radius: 8px;
    }

    .question h2 {
      margin: 0 0 10px;
      font-size: clamp(1.22rem, 4vw, 1.72rem);
      line-height: 1.5;
      letter-spacing: 0;
    }

    .question-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .workbox {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px dashed #bdcbd2;
      background: white;
      border-radius: 8px;
      color: var(--muted);
      line-height: 1.55;
    }

    .coach-thread {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .bubble {
      width: fit-content;
      max-width: min(92%, 680px);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      line-height: 1.65;
      background: white;
    }

    .bubble.coach {
      border-color: #bcd9dc;
      background: var(--soft-teal);
    }

    .bubble.student {
      justify-self: end;
      border-color: #c8d8e6;
      background: var(--soft-blue);
    }

    .bubble.alert {
      border-color: #efb4bd;
      background: var(--soft-rose);
    }

    .bubble.ok {
      border-color: #a8d49b;
      background: #f1faee;
    }

    .visual {
      margin-top: 12px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      overflow: auto;
    }

    .concept-card {
      display: grid;
      gap: 12px;
      padding: 16px;
      border: 1px solid #bcd9dc;
      border-radius: 8px;
      background: var(--soft-teal);
      line-height: 1.7;
    }

    .concept-card h2 {
      margin: 0;
      font-size: clamp(1.25rem, 4vw, 1.8rem);
    }

    .concept-card strong { color: #0b6668; }

    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .option {
      display: flex;
      align-items: center;
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      padding: 12px;
      text-align: left;
      cursor: pointer;
      line-height: 1.35;
    }

    .option:hover { border-color: var(--teal); background: var(--soft-teal); }
    .option.correct { border-color: var(--green); background: #edf7e9; }
    .option.wrong { border-color: var(--rose); background: var(--soft-rose); }

    .answer-panel {
      display: grid;
      grid-column: 1 / -1;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: white;
    }

    .answer-panel.reply-mode {
      border-color: #bcd9dc;
      background: #fbfefd;
    }

    .answer-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
      gap: 12px;
    }

    .answer-field {
      display: grid;
      gap: 6px;
      color: var(--muted);
      line-height: 1.45;
    }

    .answer-field strong { color: var(--ink); }

    .answer-input,
    .photo-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      color: var(--ink);
    }

    .photo-preview {
      display: none;
      max-height: 260px;
      width: 100%;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f7faf9;
    }

    .photo-preview.show { display: block; }

    .answer-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
    }

    .review-note {
      margin: 0;
      color: var(--muted);
      font-size: .94rem;
      line-height: 1.55;
    }

    .feedback {
      display: none;
      border-radius: 8px;
      padding: 14px;
      line-height: 1.7;
      border: 1px solid var(--line);
      background: white;
    }

    .feedback.show { display: block; }
    .feedback.ok { border-color: #a8d49b; background: #f1faee; }
    .feedback.bad { border-color: #efb4bd; background: #fff4f5; }

    .explain-title {
      margin: 0 0 6px;
      font-weight: 700;
    }

    .step-list {
      margin: 8px 0 0;
      padding-left: 1.25rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
    }

    .mini-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .report {
      display: none;
      white-space: pre-wrap;
      line-height: 1.65;
      background: #f7faf9;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      color: var(--ink);
    }

    .report.show { display: block; }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: white;
    }

    svg { max-width: 100%; height: auto; }

    @media (max-width: 760px) {
      .app-shell { padding: 14px; }
      .topbar { display: grid; }
      .actions { justify-content: flex-start; }
      .layout { grid-template-columns: 1fr; }
      .side { position: static; }
      .options { grid-template-columns: 1fr; }
      .answer-grid { grid-template-columns: 1fr; }
      .status-row { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>Bobo 數學畢業考練習</h1>
        <p class="subtitle">康軒六下範圍：第 5 單元怎樣解題、第 6 單元圓形圖。先練畢業考常考的解題模型、圓形百分圖、圓形圖應用和可能性。</p>
      </div>
      <div class="actions">
        <button class="btn primary" id="startMixedBtn">開始混合練習</button>
        <button class="btn" id="wrongBtn">錯題加強</button>
        <button class="btn" id="tgConfigBtn">通知設定</button>
        <button class="btn warn" id="resetBtn">清除本機紀錄</button>
      </div>
    </header>

    <section class="panel" id="tgConfigPanel" style="display:none; margin-top:12px;">
      <strong>Telegram 自動回報</strong>
      <div style="display:grid; gap:8px; margin-top:8px;">
        <label>Bot Token <input id="tgToken" type="password" style="width:100%; border:1px solid var(--line); border-radius:8px; padding:8px;"></label>
        <label>Chat ID <input id="tgChatId" type="text" style="width:100%; border:1px solid var(--line); border-radius:8px; padding:8px;"></label>
        <label>AI 批改網址 <input id="aiEndpoint" type="url" placeholder="https://bobo-math-grader.bobo-math-grader.workers.dev" style="width:100%; border:1px solid var(--line); border-radius:8px; padding:8px;"></label>
        <button class="btn primary" id="saveTgBtn" type="button">儲存通知設定</button>
        <span class="subtitle">完成單元、看提示、答錯、照片算式、錯題加強完成都會自動回報。AI 網址留空時，照片會先傳給媽媽人工確認，不會算精熟。</span>
      </div>
    </section>

    <section class="layout">
      <aside class="panel side">
        <h2 class="scope-title">畢業考範圍</h2>
        <div class="unit-list" id="unitList"></div>
        <div class="progress">
          <div id="progressText">完成 0 / 0 題</div>
          <div class="bar"><span id="progressBar"></span></div>
          <div id="accuracyText">答對率 0%</div>
          <div id="wrongText">待加強 0 題</div>
        </div>
      </aside>

      <section class="panel exam-card">
        <div class="status-row">
          <span class="pill" id="modeLabel">請選一個單元，或開始混合練習</span>
          <span id="queueLabel">題庫已載入</span>
        </div>

        <div id="questionArea" class="empty">選擇單元後會從概念卡開始，答錯會立刻留下錯題紀錄。</div>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback"></div>

        <div class="toolbar">
          <div class="mini-actions">
            <button class="btn" id="hintBtn" disabled>看提示</button>
            <button class="btn" id="nextBtn" disabled>下一題</button>
            <button class="btn" id="reportBtn">產生回報</button>
          </div>
          <div class="mini-actions">
            <button class="btn" id="shuffleBtn">換一輪新題</button>
          </div>
        </div>

        <pre class="report" id="reportBox"></pre>
      </section>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "bobo_math_graduation_20260515";
    const SESSION_KEY = "bobo_math_graduation_active_session_v1";
    const DEFAULT_AI_ENDPOINT = "https://bobo-math-grader.bobo-math-grader.workers.dev";

    const UNITS = [
      { id: "sumdiff", label: "5-1 和差問題", group: "怎樣解題" },
      { id: "age", label: "5-2 年齡問題", group: "怎樣解題" },
      { id: "chicken", label: "5-3 雞兔問題", group: "怎樣解題" },
      { id: "combination", label: "5-4 組合問題", group: "怎樣解題" },
      { id: "percentPie", label: "6-1 圓形百分圖", group: "圓形圖" },
      { id: "pieChart", label: "6-2 圓形圖", group: "圓形圖" },
      { id: "pieApply", label: "6-3 圓形圖應用", group: "圓形圖" },
      { id: "probability", label: "6-4 認識可能性", group: "圓形圖" }
    ];

    const QUESTION_BANK = [
      {
        id: "sumdiff-1",
        unit: "sumdiff",
        level: "基礎",
        title: "哥哥和妹妹共有 86 元，哥哥比妹妹多 18 元。妹妹有多少元？",
        work: "和差問題：小數 = (和 - 差) ÷ 2。",
        options: ["34 元", "52 元", "68 元", "43 元"],
        answer: 0,
        hint: "先把哥哥多出來的 18 元拿掉，剩下就是兩個妹妹的錢。",
        steps: ["86 - 18 = 68", "68 ÷ 2 = 34", "妹妹有 34 元。"]
      },
      {
        id: "sumdiff-2",
        unit: "sumdiff",
        level: "基礎",
        title: "兩個數的和是 124，差是 36。較大的數是多少？",
        work: "和差問題：大數 = (和 + 差) ÷ 2。",
        options: ["44", "80", "88", "160"],
        answer: 1,
        hint: "要求較大數，要把差加回去再平分。",
        steps: ["124 + 36 = 160", "160 ÷ 2 = 80", "較大的數是 80。"]
      },
      {
        id: "sumdiff-3",
        unit: "sumdiff",
        level: "進階",
        title: "甲、乙兩袋米共有 75 公斤，甲袋比乙袋少 13 公斤。甲袋有多少公斤？",
        work: "甲比較少，所以甲是小數。",
        options: ["31 公斤", "44 公斤", "62 公斤", "37.5 公斤"],
        answer: 0,
        hint: "小數 = (和 - 差) ÷ 2，題目問比較少的甲。",
        steps: ["75 - 13 = 62", "62 ÷ 2 = 31", "甲袋有 31 公斤。"]
      },
      {
        id: "sumdiff-4",
        unit: "sumdiff",
        level: "進階",
        title: "兩條繩子共長 208 公分，長繩比短繩多 46 公分。長繩長多少公分？",
        work: "找長繩：把差加到總和後再平分。",
        options: ["81 公分", "127 公分", "162 公分", "104 公分"],
        answer: 1,
        hint: "長繩 = (208 + 46) ÷ 2。",
        steps: ["208 + 46 = 254", "254 ÷ 2 = 127", "長繩長 127 公分。"]
      },
      {
        id: "age-1",
        unit: "age",
        level: "基礎",
        title: "媽媽今年 39 歲，Bobo 今年 12 歲。幾年後媽媽的年齡是 Bobo 的 2 倍？",
        work: "年齡差固定不變，媽媽一直比 Bobo 大 27 歲。",
        options: ["9 年後", "12 年後", "15 年後", "27 年後"],
        answer: 2,
        hint: "當媽媽是 Bobo 的 2 倍時，兩人的差剛好等於那時 Bobo 的年齡。",
        steps: ["39 - 12 = 27", "那時 Bobo 27 歲", "27 - 12 = 15", "15 年後。"]
      },
      {
        id: "age-2",
        unit: "age",
        level: "基礎",
        title: "爸爸今年 42 歲，小安今年 10 歲。幾年前爸爸的年齡是小安的 5 倍？",
        work: "往前推 x 年：42 - x = 5 × (10 - x)。",
        options: ["2 年前", "4 年前", "6 年前", "8 年前"],
        answer: 0,
        hint: "可以代入選項檢查：爸爸年齡是不是小孩的 5 倍。",
        steps: ["2 年前爸爸 40 歲", "2 年前小安 8 歲", "40 ÷ 8 = 5", "所以是 2 年前。"]
      },
      {
        id: "age-3",
        unit: "age",
        level: "進階",
        title: "姐姐今年 18 歲，弟弟今年 10 歲。幾年後兩人的年齡和是 44 歲？",
        work: "每過 1 年，兩人的年齡和會增加 2 歲。",
        options: ["6 年後", "8 年後", "10 年後", "16 年後"],
        answer: 1,
        hint: "現在年齡和是多少？還差多少？每年會增加 2。",
        steps: ["18 + 10 = 28", "44 - 28 = 16", "16 ÷ 2 = 8", "8 年後。"]
      },
      {
        id: "age-4",
        unit: "age",
        level: "進階",
        title: "阿姨今年 35 歲，外甥今年 7 歲。幾年後阿姨的年齡是外甥的 3 倍？",
        work: "年齡差 28 歲固定；3 倍時，差是外甥年齡的 2 倍。",
        options: ["3 年後", "5 年後", "7 年後", "9 年後"],
        answer: 2,
        hint: "3 倍表示大的人比小的人多 2 份。",
        steps: ["35 - 7 = 28", "28 ÷ 2 = 14", "那時外甥 14 歲", "14 - 7 = 7", "7 年後。"]
      },
      {
        id: "chicken-1",
        unit: "chicken",
        level: "基礎",
        title: "雞和兔共有 16 隻，腳共有 44 隻。兔有幾隻？",
        work: "全部先當雞，每隻 2 隻腳；多出來的腳每 2 隻代表 1 隻兔。",
        options: ["4 隻", "6 隻", "10 隻", "12 隻"],
        answer: 1,
        hint: "16 隻都當雞會有 32 隻腳，和 44 差多少？",
        steps: ["16 × 2 = 32", "44 - 32 = 12", "12 ÷ 2 = 6", "兔有 6 隻。"]
      },
      {
        id: "chicken-2",
        unit: "chicken",
        level: "基礎",
        title: "停車場有腳踏車和汽車共 18 輛，輪子共 54 個。汽車有幾輛？",
        work: "全部先當腳踏車，每輛 2 個輪子；多出的輪子每 2 個代表 1 輛汽車。",
        options: ["7 輛", "9 輛", "11 輛", "14 輛"],
        answer: 1,
        hint: "把汽車想成比腳踏車多 2 個輪子。",
        steps: ["18 × 2 = 36", "54 - 36 = 18", "18 ÷ 2 = 9", "汽車有 9 輛。"]
      },
      {
        id: "chicken-3",
        unit: "chicken",
        level: "進階",
        title: "雞和兔共有 25 隻，腳共有 70 隻。雞有幾隻？",
        work: "先求兔，再用總數扣掉兔。",
        options: ["10 隻", "12 隻", "15 隻", "20 隻"],
        answer: 2,
        hint: "全部當雞有 50 隻腳，多出 20 隻腳。",
        steps: ["25 × 2 = 50", "70 - 50 = 20", "20 ÷ 2 = 10，所以兔 10 隻", "25 - 10 = 15", "雞有 15 隻。"]
      },
      {
        id: "chicken-4",
        unit: "chicken",
        level: "進階",

    function buildMistakeReviewQueue(bank) {
      const groups = [];
      const byConcept = new Map();
      bank.forEach(item => {
        if (!byConcept.has(item.unit)) {
          byConcept.set(item.unit, []);
          groups.push({ unit: item.unit, items: byConcept.get(item.unit) });
        }
        byConcept.get(item.unit).push(item);
      });
      return groups.flatMap((group, groupIndex) => {
        const conceptCard = {
          type: "concept",
          id: `concept-${group.unit}-${groupIndex}`,
          unit: group.unit,
          conceptIndex: groupIndex + 1,
          conceptTotal: groups.length,
          title: `${unitInfo(group.unit).label} 觀念加強`,
          text: conceptExplanation(group.unit),
          cardKind: "錯題觀念"
        };
        const originals = group.items.map(item => ({ ...item, reviewKind: "原錯題" }));
        const variations = group.items.flatMap(item => generatedVariationQuestions(item).map((v, index) => ({
          ...v,
          reviewKind: `變化題 ${index + 1}`,
          sourceOriginal: item.id
        })));
        return [conceptCard, ...originals, ...variations];
      });
    }

    function generatedVariationQuestions(item) {
      const generators = {
        sumdiff: generateSumdiffVariations,
        age: generateAgeVariations,
        chicken: generateChickenVariations,
        combination: generateCombinationVariations,
        percentPie: generatePercentPieVariations,
        pieChart: generatePieChartVariations,
        pieApply: generatePieApplyVariations,
        probability: generateProbabilityVariations
      };
      const generated = (generators[item.unit] || generateFallbackVariations)(item);
      return generated.slice(0, 2).map((q, index) => ({
        ...q,
        id: `${item.id}-gen-${index + 1}-${Date.now()}`,
        unit: item.unit,
        level: "換數字",
        originalId: item.id
      }));
    }

    function mcOptions(answer, offsets = [-12, 8, 16]) {
      const values = [answer, ...offsets.map(offset => answer + offset).filter(value => value > 0)];
      return [...new Set(values)].slice(0, 4).map(String);
    }

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function makeOptions(correct, unitText = "", distractors = []) {
      const base = [correct, ...distractors.filter(value => value !== correct && value > 0)];
      while (base.length < 4) {
        const offset = randInt(-9, 12);
        const value = correct + offset;
        if (value > 0 && !base.includes(value)) base.push(value);
      }
      const options = shuffle(base.slice(0, 4)).map(value => `${value}${unitText}`);
      return { options, answer: options.indexOf(`${correct}${unitText}`) };
    }

    function makeFractionOptions(num, den) {
      const gcd = (a, b) => b ? gcd(b, a % b) : a;
      const divisor = gcd(num, den);
      const correct = `${num / divisor}/${den / divisor}`;
      const candidates = [correct, `${num}/${den}`, `${Math.max(1, num - 1)}/${den}`, `${num}/${den + 1}`];
      const options = shuffle([...new Set(candidates)]).slice(0, 4);
      while (options.length < 4) options.push(`${randInt(1, den - 1)}/${den}`);
      return { options, answer: options.indexOf(correct) };
    }

    function generatedPracticeQuestion(unitId, serial) {
      const id = `${unitId}-fresh-${Date.now()}-${serial}-${randInt(1000, 9999)}`;
      if (unitId === "sumdiff") {
        const small = randInt(18, 78);
        const diff = randInt(8, 36);
        const big = small + diff;
        const sum = small + big;
        const askBig = Math.random() > 0.5;
        const correct = askBig ? big : small;
        const opts = makeOptions(correct);
        return { id, unit: unitId, level: "新題", title: `兩個數的和是 ${sum}，差是 ${diff}。${askBig ? "較大的數" : "較小的數"}是多少？`, work: "和差問題：先判斷要求大數或小數。", ...opts, hint: "", steps: [askBig ? `${sum} + ${diff} = ${sum + diff}` : `${sum} - ${diff} = ${sum - diff}`, `${askBig ? sum + diff : sum - diff} ÷ 2 = ${correct}`, `答案是 ${correct}。`] };
      }
      if (unitId === "age") {
        const child = randInt(8, 15);
        const gap = randInt(20, 34);
        const adult = child + gap;
        const targetChild = gap;
        const years = targetChild - child;
        const opts = makeOptions(years, " 年後", [years + 2, years - 2, years + 5]);
        return { id, unit: unitId, level: "新題", title: `爸爸今年 ${adult} 歲，小安今年 ${child} 歲。幾年後爸爸年齡是小安的 2 倍？`, work: "年齡差固定，2 倍時差等於小孩那時的年齡。", ...opts, hint: "", steps: [`${adult} - ${child} = ${gap}`, `2 倍時小安是 ${gap} 歲`, `${gap} - ${child} = ${years}`, `${years} 年後。`] };
      }
      if (unitId === "chicken") {
        const rabbits = randInt(5, 16);
        const chickens = randInt(8, 24);
        const total = rabbits + chickens;
        const feet = rabbits * 4 + chickens * 2;
        const opts = makeOptions(rabbits, " 隻", [rabbits - 2, rabbits + 2, chickens]);
        return { id, unit: unitId, level: "新題", title: `雞和兔共有 ${total} 隻，腳共有 ${feet} 隻。兔有幾隻？`, work: "全部先當雞，再看多出的腳。", ...opts, hint: "", steps: [`${total} × 2 = ${total * 2}`, `${feet} - ${total * 2} = ${feet - total * 2}`, `${feet - total * 2} ÷ 2 = ${rabbits}`, `兔有 ${rabbits} 隻。`] };
      }
      if (unitId === "combination") {
        const a = randInt(2, 5), b = randInt(2, 5), c = randInt(2, 4);
        const correct = a * b * c;
        const opts = makeOptions(correct, " 種", [a + b + c, a * b, correct + a]);
        return { id, unit: unitId, level: "新題", title: `有 ${a} 種主餐、${b} 種飲料和 ${c} 種甜點，各選一種，共有幾種搭配？`, work: "每一階段都選一個，用乘法原理。", ...opts, hint: "", steps: [`${a} × ${b} × ${c} = ${correct}`, `共有 ${correct} 種搭配。`] };
      }
      if (unitId === "percentPie") {
        const total = randInt(8, 18) * 20;
        const percent = [15, 20, 25, 30, 35, 40, 45][randInt(0, 6)];
        const correct = total * percent / 100;
        const opts = makeOptions(correct, " 人", [correct + 8, correct - 8, Math.round(total / 2)]);
        return { id, unit: unitId, level: "新題", title: `六年級共有 ${total} 人，參加某活動的占 ${percent}%。參加的有幾人？`, work: "全部 × 百分率 = 部分。", ...opts, hint: "", steps: [`${total} × ${percent}% = ${total} × ${percent / 100}`, `= ${correct}`, `有 ${correct} 人。`] };
      }
      if (unitId === "pieChart") {
        const angles = [45, 60, 72, 90, 120, 135, 144, 180];
        const angle = angles[randInt(0, angles.length - 1)];
        const percent = angle / 360 * 100;
        const opts = makeOptions(percent, "%", [percent + 5, percent - 5, Math.round(percent * 2)]);
        return { id, unit: unitId, level: "新題", title: `圓形圖中，某區塊圓心角是 ${angle} 度。這個區塊占全部的百分之幾？`, work: "比例 = 角度 ÷ 360，再換成百分率。", ...opts, hint: "", steps: [`${angle} ÷ 360 = ${percent / 100}`, `= ${percent}%。`] };
      }
      if (unitId === "pieApply") {
        const total = randInt(8, 16) * 30;
        const p1 = [35, 40, 45, 50][randInt(0, 3)];
        const p2 = [15, 20, 25, 30][randInt(0, 3)];
        const diff = p1 - p2;
        const correct = total * diff / 100;
        const opts = makeOptions(correct, " 人", [correct + 12, correct - 12, total * p2 / 100]);
        return { id, unit: unitId, level: "新題", title: `全校 ${total} 人投票，甲活動占 ${p1}%，乙活動占 ${p2}%。甲比乙多幾人？`, work: "先比較百分率差，再乘總人數。", ...opts, hint: "", steps: [`${p1}% - ${p2}% = ${diff}%`, `${total} × ${diff}% = ${correct}`, `多 ${correct} 人。`] };
      }
      const total = randInt(8, 16);
      const target = randInt(2, total - 2);
      const frac = makeFractionOptions(target, total);
      return { id, unit: "probability", level: "新題", title: `袋中共有 ${total} 顆球，其中紅球 ${target} 顆。隨機抽 1 顆，抽到紅球的可能性是多少？`, work: "可能性 = 符合條件的數量 ÷ 全部數量。", ...frac, hint: "", steps: [`紅球 ${target} 顆，全部 ${total} 顆`, `可能性是 ${target}/${total}`, `約分後是 ${frac.options[frac.answer]}。`] };
    }

    function startMode(mode, unitId = "") {
      clearActiveSession();
      const pendingWrongIds = Object.keys(state.wrong).filter(id => state.wrong[id]);
      const forcedWrongReview = mode !== "wrong" && pendingWrongIds.length > 0;
      if (forcedWrongReview) {
        mode = "wrong";
        unitId = "";
      }
      currentMode = mode;
      activeUnitId = unitId;
      sessionStats = freshSessionStats();
      sessionCompleteNotified = false;
      currentReviewOriginalIds = [];
      reviewPasses = {};
      reportBox.classList.remove("show");
      feedbackEl.className = "feedback";
      feedbackEl.innerHTML = "";
      answered = false;
      currentWrongRecorded = false;
      currentHintUsed = false;
      currentHintNotified = false;

      if (mode === "unit") {
        currentQueue = [unitOverviewCard(unitId), ...shuffle(practiceBankForUnit(unitId))];
        modeLabel.textContent = unitInfo(unitId).label;
        renderUnits(unitId);
      } else if (mode === "wrong") {
        activeUnitId = "wrong";
        const wrongIds = Object.keys(state.wrong).filter(id => state.wrong[id]);
        currentReviewOriginalIds = wrongIds;
        reviewPasses = Object.fromEntries(wrongIds.map(id => [id, { original: false, variations: new Set() }]));
        currentQueue = buildMistakeReviewQueue(QUESTION_BANK.filter(q => wrongIds.includes(q.id)));
        modeLabel.textContent = "錯題加強";
        renderUnits();
      } else {
        activeUnitId = "mixed";
        currentQueue = UNITS.flatMap(unit => [unitOverviewCard(unit.id), ...shuffle(practiceBankForUnit(unit.id))]);
        modeLabel.textContent = "畢業考混合練習";
        renderUnits();
      }

      currentIndex = -1;
      if (currentQueue.length === 0) {
        questionArea.className = "empty";
        questionArea.textContent = mode === "wrong" ? "目前沒有待加強錯題。可以先做混合練習。" : "這個範圍目前沒有題目。";
        optionsEl.innerHTML = "";
        hintBtn.disabled = true;
        nextBtn.disabled = true;
        queueLabel.textContent = "0 題";
        return;
      }
      nextQuestion();
      if (forcedWrongReview) {
        feedbackEl.className = "feedback show";
        feedbackEl.innerHTML = `
          <div class="coach-thread">
            <div class="bubble coach alert">先完成上次留下的錯題加強，才能開始新的練習。</div>
            <div class="bubble coach">規則是：原錯題通過後，還要完成兩題變化題。</div>
          </div>
        `;
      }
    }

    function nextQuestion() {
      currentIndex += 1;
      if (currentIndex >= currentQueue.length) {
        finalizeMistakeReview();
        clearActiveSession();
        const remainingReviewIds = currentMode === "wrong"
          ? currentReviewOriginalIds.filter(id => state.wrong[id])
          : [];
        if (remainingReviewIds.length > 0) {
          questionArea.className = "empty";
          questionArea.innerHTML = `
            <div class="coach-thread">
              <div class="bubble coach alert">錯題加強還沒通過，不能算完成。</div>
              <div class="bubble coach">還有 ${remainingReviewIds.length} 題待加強。原錯題和兩題變化題都通過，才會清掉。</div>
            </div>
          `;
          optionsEl.innerHTML = `<button class="btn primary" id="retryWrongBtn" type="button">再練一次錯題加強</button>`;
          document.getElementById("retryWrongBtn").addEventListener("click", () => startMode("wrong"));
          feedbackEl.className = "feedback show";
          feedbackEl.innerHTML = "這一輪有題目沒有真正學會，請再練一次。";
          hintBtn.disabled = true;
          nextBtn.disabled = true;
          queueLabel.textContent = `仍待加強 ${remainingReviewIds.length} 題`;
          updateProgress();
          sendTgMessage(
            `Bobo 數學錯題加強未完成\n` +
            `仍待加強：${remainingReviewIds.length} 題\n` +
            `本輪未提示答對：${sessionStats.cleanCorrect}\n` +
            `本輪首次答錯：${sessionStats.firstWrong}\n` +
            `需要再練一次，不能算完成。`
          );
          return;
        }
        const pendingUnitWrongIds = currentMode === "unit"
          ? Object.keys(state.wrong).filter(id => state.wrong[id] && (QUESTION_BANK.find(q => q.id === id) || {}).unit === activeUnitId)
          : [];
        if (pendingUnitWrongIds.length > 0) {
          questionArea.className = "empty";
          questionArea.innerHTML = `
            <div class="coach-thread">
              <div class="bubble coach alert">這個小單元還不能結束，先把錯題學會。</div>
              <div class="bubble coach">${unitInfo(activeUnitId).label} 有 ${pendingUnitWrongIds.length} 題待加強。接下來會先看觀念卡，再練原錯題和兩題變化題。</div>
            </div>
          `;
          optionsEl.innerHTML = `<button class="btn primary" id="startUnitWrongBtn" type="button">開始錯題加強</button>`;
          document.getElementById("startUnitWrongBtn").addEventListener("click", () => startMode("wrong"));
          feedbackEl.className = "feedback show";
          feedbackEl.innerHTML = "完成錯題加強後，這個單元才會算真正結束。";
          hintBtn.disabled = true;
          nextBtn.disabled = true;
          queueLabel.textContent = `待加強 ${pendingUnitWrongIds.length} 題`;
          updateProgress();
          sendTgMessage(`Bobo 數學單元待加強\n單元：${unitInfo(activeUnitId).label}\n待加強：${pendingUnitWrongIds.length} 題\n已提示先做錯題加強，完成後才算結束。`);
          return;
        }
        questionArea.className = "empty";
        questionArea.innerHTML = "這一輪完成了。可以產生回報，或再換一輪順序。";
        optionsEl.innerHTML = "";
        feedbackEl.className = "feedback";
        hintBtn.disabled = true;
        nextBtn.disabled = true;
        queueLabel.textContent = `完成 ${currentQueue.length} 題`;
        updateProgress();
        notifySessionComplete();
        return;
      }

      currentQuestion = currentQueue[currentIndex];
      answered = false;
      currentWrongRecorded = false;
      currentHintUsed = false;
      currentHintNotified = false;
      renderQuestion(currentQuestion);
      queueLabel.textContent = `${currentIndex + 1} / ${currentQueue.length}`;
      hintBtn.disabled = currentQuestion.type === "concept";
      nextBtn.disabled = currentQuestion.type !== "concept";
      saveActiveSession();
    }

    function previewWorkPhoto(event) {
      const file = event.target.files && event.target.files[0];
      const preview = document.getElementById("workPhotoPreview");
      if (!file || !preview) return;
      const reader = new FileReader();
      reader.onload = () => {
        preview.src = reader.result;

      };
      reader.readAsDataURL(file);
    }

    function renderVisual(type) {
      if (type === "percent25") {
        return `<div class="visual">${pieSvg([25, 75], ["#0f8b8d", "#d8e1e6"], ["25%", "75%"])}</div>`;
      }
      if (type === "angle72") {
        return `<div class="visual">${pieSvg([20, 80], ["#d99b25", "#d8e1e6"], ["72度", "其餘"])}</div>`;
      }
      return "";
    }

    function pieSvg(values, colors, labels) {
      let start = -90;
      const slices = values.map((value, i) => {
        const angle = value / 100 * 360;
        const path = describeArc(100, 100, 82, start, start + angle);
        const mid = start + angle / 2;
        const labelPoint = polarToCartesian(100, 100, 48, mid);
        start += angle;
        return `<path d="${path}" fill="${colors[i]}" stroke="#fff" stroke-width="2"></path>
          <text x="${labelPoint.x}" y="${labelPoint.y}" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="700" fill="#17212b">${labels[i]}</text>`;
      }).join("");
      return `<svg viewBox="0 0 200 200" width="220" role="img" aria-label="圓形圖">${slices}<circle cx="100" cy="100" r="82" fill="none" stroke="#aebbc2" stroke-width="1"></circle></svg>`;
    }

    function polarToCartesian(cx, cy, r, angle) {
      const rad = angle * Math.PI / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }

    function describeArc(cx, cy, r, startAngle, endAngle) {
      const start = polarToCartesian(cx, cy, r, endAngle);
      const end = polarToCartesian(cx, cy, r, startAngle);
      const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
      return `M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${largeArcFlag} 0 ${end.x} ${end.y} Z`;
    }

    function chooseAnswer(index, btn) {
      if (answered || !currentQuestion) return;

      const q = currentQuestion;
      const ok = index === q.answer;
      state.attempts[q.id] = state.attempts[q.id] || { tries: 0, correct: 0, unit: q.unit };
      state.attempts[q.id].tries += 1;
      if (ok) {
        answered = true;
        sessionStats.answered += 1;
        if (!currentHintUsed) {
          sessionStats.cleanCorrect += 1;
          state.attempts[q.id].correct += 1;
          state.completed[q.id] = true;
          recordReviewPass(q);
        } else if (!q.originalId) {
          sessionStats.hintedCorrect += 1;
          state.wrong[q.id] = true;
          state.history[q.id] = {
            id: q.id,
            unit: q.unit,
            title: q.title,
            correct: q.options[q.answer],
            missedAt: new Date().toISOString(),
            status: "hint_used"
          };
          notifyMathEvent("hintedCorrect", q, "這題看過提示，因此不算精熟，已保留待加強。");
        }
        [...optionsEl.children].forEach((optionEl, optionIndex) => {
          optionEl.disabled = true;
          if (optionIndex === q.answer) optionEl.classList.add("correct");
        });
        feedbackEl.className = "feedback show ok";
        feedbackEl.innerHTML = `
          <p class="explain-title">${currentHintUsed ? "提示後答對，先留在待加強" : "答對了"}</p>
          ${currentHintUsed ? "<div>這題有看提示，所以不算精熟；之後錯題加強會再練一次。</div>" : ""}
          <div>答案：${q.options[q.answer]}</div>
          <ol class="step-list">${q.steps.map(step => `<li>${step}</li>`).join("")}</ol>
        `;
        hintBtn.disabled = true;
        nextBtn.disabled = false;
      } else {
        if (!currentWrongRecorded && !q.originalId) {
          sessionStats.firstWrong += 1;
          state.wrong[q.id] = true;
          state.history[q.id] = {
            id: q.id,
            unit: q.unit,
            title: q.title,
            correct: q.options[q.answer],
            missedAt: new Date().toISOString(),
            status: "active"
          };
          const line = `${unitInfo(q.unit).label}：${q.title}\nBobo答：${q.options[index]}；正解：${q.options[q.answer]}`;
          sessionStats.mistakeLines.push(line);
          notifyMathEvent("wrong", q, `Bobo答：${q.options[index]}\n已立刻加入待加強。`);
          currentWrongRecorded = true;
        }
        btn.classList.add("wrong");
        btn.disabled = true;
        feedbackEl.className = "feedback show bad";
        feedbackEl.innerHTML = `
          <p class="explain-title">先記成待加強，這題再試一次</p>
          <div>${safeHint(q)}</div>
        `;
        hintBtn.disabled = false;
        nextBtn.disabled = true;
      }
      saveState();
      saveActiveSession();
      updateProgress();
      if (ok && currentIndex >= currentQueue.length - 1) notifySessionComplete();
    }

    function expectedAnswer(q) {
      return q && q.options ? q.options[q.answer] : "";
    }

    function normalizeAnswerText(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/百分之/g, "")
        .replace(/[，,。．\s]/g, "")
        .replace(/(大卡|公分|公斤|分鐘|小時|人|元|度|頁|位|種|隻|輛|艘|顆|本|張|格|層|球|個|cc|c\.c\.)/g, "")
        .replace(/％/g, "%");
    }

    function answerNumber(value) {
      const text = normalizeAnswerText(value);
      const fraction = text.match(/(-?\d+(?:\.\d+)?)\/(-?\d+(?:\.\d+)?)/);
      if (fraction && Number(fraction[2]) !== 0) return Number(fraction[1]) / Number(fraction[2]);
      const percent = text.match(/(-?\d+(?:\.\d+)?)%/);
      if (percent) return Number(percent[1]);
      const number = text.match(/-?\d+(?:\.\d+)?/);
      return number ? Number(number[0]) : NaN;
    }

    function typedAnswerMatches(q, value) {
      const expected = expectedAnswer(q);
      const normalizedExpected = normalizeAnswerText(expected);
      const normalizedValue = normalizeAnswerText(value);
      if (normalizedExpected && normalizedExpected === normalizedValue) return true;
      const expectedNumber = answerNumber(expected);
      const answerValue = answerNumber(value);
      if (!Number.isFinite(expectedNumber) || !Number.isFinite(answerValue)) return false;
      return Math.abs(expectedNumber - answerValue) < 0.001;
    }

    function safeHint(q) {
      const map = {
        sumdiff: "先把「和」與「差」標出來，畫兩條線段比較長短；不要先猜答案。",
        age: "先找兩人的年齡差，年齡差不會隨時間改變；再看題目問的是現在、幾年前或幾年後。",
        chicken: "先假設全部都是同一種，再用每一隻腳數或輪數的差去調整。",
        combination: "先分清楚是「每階段各選一個」還是「兩兩配對」；可以畫空格、表格或樹狀圖。",
        percentPie: "先確認全部是多少，再把百分率換成分數或小數來算部分量。",
        pieChart: "圓形圖一整圈是 360 度；先找每個扇形占整體的幾分之幾。",
        pieApply: "先把圓形圖中的百分率或角度補齊，再比較題目問的兩個部分。",
        probability: "先數全部可能有幾個，再數符合條件的有幾個，用「符合 / 全部」來想。"
      };
      return map[q.unit] || "先畫圖或列式，把已知條件整理好，再一步一步算。";
    }

    function readWorkPhoto() {
      const input = document.getElementById("workPhotoInput");
      const file = input && input.files && input.files[0];
      if (!file) return Promise.resolve("");
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function gradeWithAi(q, studentAnswer, imageDataUrl) {
      const config = JSON.parse(localStorage.getItem("bobo_tg_config") || "{}");
      if (!config.aiEndpoint) return null;
      const response = await fetch(config.aiEndpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          questionId: q.id,
          unit: unitInfo(q.unit).label,
          title: q.title,
          prompt: q.work,
          expectedAnswer: expectedAnswer(q),
          expectedSteps: q.steps,
          studentAnswer,
          imageDataUrl
        })
      });
      if (!response.ok) throw new Error(`AI 批改失敗：${response.status}`);
      return response.json();
    }

    function markQuestionNeedsReview(q, status, extraLine = "") {
      if (currentWrongRecorded || q.originalId) return;
      sessionStats.firstWrong += 1;
      state.wrong[q.id] = true;
      state.history[q.id] = {
        id: q.id,
        unit: q.unit,
        title: q.title,
        correct: expectedAnswer(q),
        missedAt: new Date().toISOString(),
        status
      };
      const line = `${unitInfo(q.unit).label}：${q.title}\n${extraLine || `正解：${expectedAnswer(q)}`}`;
      sessionStats.mistakeLines.push(line);
      currentWrongRecorded = true;
    }

    function recordReviewPass(q) {
      if (currentMode !== "wrong") return;
      const originalId = q.sourceOriginal || q.originalId || q.id;
      const progress = reviewPasses[originalId];
      if (!progress) return;
      if (q.originalId || q.sourceOriginal) progress.variations.add(q.id);
      else progress.original = true;
    }

    function finalizeMistakeReview() {
      if (currentMode !== "wrong") return;
      let learned = 0;
      currentReviewOriginalIds.forEach(id => {
        const progress = reviewPasses[id];
        if (progress && progress.original && progress.variations.size >= 2) {
          delete state.wrong[id];
          if (state.history[id]) state.history[id].status = "learned";
          learned += 1;
        } else if (state.history[id]) {
          state.history[id].status = "needs_review";
        }
      });
      if (learned > 0) {
        sessionStats.reviewed += learned;
        saveState();
      }
    }

    async function submitWrittenWork() {
      if (answered || !currentQuestion || currentQuestion.type === "concept") return;
      const q = currentQuestion;
      const answerInput = document.getElementById("studentAnswer");
      const submitBtn = document.getElementById("submitWorkBtn");
      const studentAnswer = answerInput ? answerInput.value.trim() : "";
      if (!studentAnswer) {
        feedbackEl.className = "feedback show bad";
        feedbackEl.innerHTML = `<div class="coach-thread"><div class="bubble alert">你還沒填最後答案。先把答案寫上，再拍照送出。</div></div>`;
        return;
      }

      const imageDataUrl = await readWorkPhoto();
      if (!imageDataUrl) {
        feedbackEl.className = "feedback show bad";
        feedbackEl.innerHTML = `<div class="coach-thread"><div class="bubble alert">要先拍算式照片。只填答案不算通過，我要看你怎麼想。</div></div>`;
        return;
      }

      submitBtn.disabled = true;
      feedbackEl.className = "feedback show";
      feedbackEl.innerHTML = `
        <div class="coach-thread">
          <div class="bubble student">我的答案：${studentAnswer}<br>已上傳算式照片。</div>
          <div class="bubble coach">收到，我正在看答案和算式。</div>
        </div>
      `;

      let aiResult = null;
      let aiError = "";
      try {
        aiResult = await gradeWithAi(q, studentAnswer, imageDataUrl);
      } catch (error) {
        aiError = error.message || "AI 批改暫時失敗";
      }

      const typedOk = typedAnswerMatches(q, studentAnswer);
      const hasAi = Boolean(aiResult);
      const workOk = hasAi ? Boolean(aiResult.workOk) : false;
      const answerOk = hasAi ? Boolean(aiResult.correct) : typedOk;
      const canMaster = hasAi && answerOk && workOk && !currentHintUsed;
      const caption = [
        "Bobo 數學算式照片",
        `單元：${unitInfo(q.unit).label}`,
        `題目：${q.title}`,
        `Bobo答案：${studentAnswer}`,
        `正解：${expectedAnswer(q)}`,
        hasAi ? `AI判斷：${answerOk && workOk ? "通過" : "需重練"}` : "AI判斷：未設定，待媽媽確認",
        aiResult && aiResult.feedback ? `回饋：${aiResult.feedback}` : "",
        currentHintUsed ? "注意：本題看過提示，不算精熟。" : "",
        aiError ? `AI錯誤：${aiError}` : ""
      ].filter(Boolean).join("\n");
      await sendTgPhoto(imageDataUrl, caption);

      state.attempts[q.id] = state.attempts[q.id] || { tries: 0, correct: 0, unit: q.unit };
      state.attempts[q.id].tries += 1;

      if (canMaster) {
        answered = true;
        sessionStats.answered += 1;
        sessionStats.cleanCorrect += 1;
        state.attempts[q.id].correct += 1;
        state.completed[q.id] = true;
        recordReviewPass(q);
        feedbackEl.className = "feedback show ok";
        feedbackEl.innerHTML = `
          <div class="coach-thread">
            <div class="bubble student">我的答案：${studentAnswer}</div>
            <div class="bubble coach ok">通過。答案是 ${expectedAnswer(q)}。${aiResult.feedback ? `<br>${aiResult.feedback}` : ""}</div>
            <div class="bubble coach">這題的標準整理：<ol class="step-list">${q.steps.map(step => `<li>${step}</li>`).join("")}</ol></div>
          </div>
        `;
        hintBtn.disabled = true;
        nextBtn.disabled = false;
      } else {
        answered = !hasAi;
        if (currentHintUsed && answerOk && workOk) {
          sessionStats.answered += 1;
          sessionStats.hintedCorrect += 1;
          markQuestionNeedsReview(q, "hint_used", `Bobo看提示後答對；正解：${expectedAnswer(q)}`);
          notifyMathEvent("hintedCorrect", q, "這題看過提示，因此不算精熟，已保留待加強。");
        } else {
          markQuestionNeedsReview(q, hasAi ? "active" : "parent_review", `Bobo答：${studentAnswer}；正解：${expectedAnswer(q)}`);
          notifyMathEvent("wrong", q, hasAi ? `Bobo答：${studentAnswer}\nAI回饋：${(aiResult && aiResult.feedback) || "需要再檢查算式。"}\n已立刻加入待加強。` : `Bobo答：${studentAnswer}\nAI 批改網址尚未設定，照片已送出待媽媽確認。`);
        }
        feedbackEl.className = "feedback show bad";
        feedbackEl.innerHTML = `
          <div class="coach-thread">
            <div class="bubble student">我的答案：${studentAnswer}</div>
            <div class="bubble coach alert">${hasAi ? "這題先不通過，請修正後再拍一次。" : "照片已送給媽媽確認；目前沒有 AI 批改網址，所以這題先不算精熟。"}</div>
            <div class="bubble coach">${hasAi ? ((aiResult && aiResult.feedback) || safeHint(q)) : "等 AI 批改後，這裡就會像聊天一樣直接告訴你哪裡要修。"}</div>
            <div class="bubble coach">小提示：${safeHint(q)}</div>
          </div>
        `;
        hintBtn.disabled = false;
        nextBtn.disabled = !answered;
      }

      submitBtn.disabled = false;
      saveState();
      saveActiveSession();
      updateProgress();
      if (answered && currentIndex >= currentQueue.length - 1) notifySessionComplete();
    }

    function showHint() {
      if (!currentQuestion || answered || currentQuestion.type === "concept") return;
      currentHintUsed = true;
      if (!currentHintNotified) {
        notifyMathEvent("hint", currentQuestion, "Bobo 按了提示，這題即使答對也不算精熟。");
        currentHintNotified = true;
      }
      feedbackEl.className = "feedback show";
      feedbackEl.innerHTML = `
        <div class="coach-thread">
          <div class="bubble coach alert">你按了提示，這題就算後來答對，也會留在待加強。</div>
          <div class="bubble coach">提示：${safeHint(currentQuestion)}</div>
        </div>
      `;
      saveActiveSession();
    }

    function notifySessionComplete() {
      if (sessionCompleteNotified) return;
      sessionCompleteNotified = true;
      const totalPractice = currentQueue.filter(item => item.type !== "concept").length;
      const duration = Math.round((Date.now() - sessionStats.startedAt) / 1000);
      const wrongCount = Object.keys(state.wrong).filter(id => state.wrong[id]).length;
      const mistakeText = sessionStats.mistakeLines.length
        ? `\n\n待加強紀錄：\n${sessionStats.mistakeLines.map((line, index) => `${index + 1}. ${line}`).join("\n")}`
        : "";
      const label = currentMode === "unit"
        ? unitInfo(activeUnitId).label
        : (currentMode === "wrong" ? "錯題加強" : "畢業考混合練習");
      sendTgMessage(
        `Bobo 數學練習完成\n` +
        `範圍：${label}\n` +
        `耗時：${duration} 秒\n` +
        `本輪題數：${totalPractice}\n` +
        `未提示答對：${sessionStats.cleanCorrect}\n` +
        `提示後答對：${sessionStats.hintedCorrect}\n` +
        `首次答錯：${sessionStats.firstWrong}\n` +
        `錯題加強完成：${sessionStats.reviewed}\n` +
        `目前待加強：${wrongCount} 題` +
        mistakeText
      );
    }

    function updateProgress() {
      const total = QUESTION_BANK.length;
      const attempts = Object.values(state.attempts);
      const completed = QUESTION_BANK.filter(q => state.completed[q.id]).length;
      const tries = attempts.reduce((sum, item) => sum + item.tries, 0);
      const correct = attempts.reduce((sum, item) => sum + item.correct, 0);
      const wrongCount = Object.keys(state.wrong).filter(id => state.wrong[id]).length;
      const rate = tries ? Math.round(correct / tries * 100) : 0;
      document.getElementById("progressText").textContent = `完成 ${completed} / ${total} 題`;
      document.getElementById("progressBar").style.width = `${Math.round(completed / total * 100)}%`;
      document.getElementById("accuracyText").textContent = `答對率 ${rate}%`;
      document.getElementById("wrongText").textContent = `待加強 ${wrongCount} 題`;
    }

    function showReport() {
      const unitLines = UNITS.map(unit => {
        const questions = byUnit(unit.id);
        const done = questions.filter(q => state.completed[q.id]).length;
        const wrong = questions.filter(q => state.wrong[q.id]).length;
        return `${unit.label}：完成 ${done}/${questions.length}，待加強 ${wrong}`;
      });
      const wrongItems = QUESTION_BANK
        .filter(q => state.wrong[q.id])
        .map(q => `- ${UNITS.find(u => u.id === q.unit).label}：${q.title}`)
        .join("\n") || "目前沒有錯題。";

      reportBox.textContent = [
        "Bobo 數學畢業考練習回報",
        `時間：${new Date().toLocaleString("zh-TW")}`,
        "",
        "範圍：康軒六下第 5 單元怎樣解題、第 6 單元圓形圖",
        "",
        unitLines.join("\n"),
        "",
        "待加強題目：",
        wrongItems
      ].join("\n");
      reportBox.classList.add("show");
    }

    function resetProgress() {
      const ok = confirm("確定要清除這台裝置上的畢業考練習紀錄嗎？");
      if (!ok) return;
      localStorage.removeItem(STORAGE_KEY);
      clearActiveSession();
      location.reload();
    }

    function shuffle(items) {
      for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      return items;
    }
  </script>
