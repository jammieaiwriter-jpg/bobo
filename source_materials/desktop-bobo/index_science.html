<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🔬 Bobo 智慧自然冒險</title>
    <script>
    window.confetti = window.confetti || function() {};
    </script>
    <style>
        :root { --primary: #4A90E2; --secondary: #50E3C2; --accent: #F5A623; --bg: #F0F7FF; --text: #2C3E50; --success: #7ED321; --danger: #FF5E5E; }
        body { font-family: 'Chalkboard SE', 'Microsoft JhengHei', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; touch-action: manipulation; }
        #game-container { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; text-align: center; }
        
        .zy-word { display: inline-flex; flex-direction: column; align-items: center; vertical-align: bottom; margin: 0 2px; line-height: 1.1; }
        .zy-top { font-size: 0.75rem; color: #888; height: 0.9rem; font-weight: normal; font-family: sans-serif; }
        .zy-bottom { font-size: 1.6rem; font-weight: bold; }
        
        .mission-panel { display: flex; flex-direction: column; gap: 12px; margin: 15px 0; }
        .mission-item { background: white; border-radius: 20px; padding: 15px; border: 3px solid var(--primary); display: flex; align-items: center; justify-content: space-between; text-align: left; cursor: pointer; box-shadow: 0 4px 0 var(--primary); }
        .mission-item:active { transform: translateY(2px); box-shadow: none; }
        .mission-item.mastered { border-color: var(--success); opacity: 0.8; box-shadow: 0 4px 0 var(--success); }
        .check-box { width: 35px; height: 35px; border: 2px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .mission-item.mastered .check-box { background: var(--success); color: white; border-color: var(--success); }

        .game-screen { display: none; }
        .game-screen.active { display: block; }
        
        .question-box { background: white; border-radius: 30px; padding: 25px; margin: 15px 0; box-shadow: 0 10px 20px rgba(0,0,0,0.05); min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .opt-btn { background: var(--primary); color: white; border: none; border-radius: 18px; padding: 15px; font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 0 #357ABD; min-height: 50px; }
        .opt-btn:active { transform: translateY(4px); box-shadow: none; }
        .opt-btn.correct { background: var(--success); box-shadow: 0 5px 0 #5fa916; }
        .opt-btn.wrong { background: var(--danger); box-shadow: 0 5px 0 #d54848; opacity: 0.78; }
        .opt-btn:disabled { cursor: default; }
        .feedback { min-height: 28px; margin-top: 10px; font-weight: bold; color: var(--primary); }
        
        #reward-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--accent); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #reward-screen.active { display: flex; animation: bounceIn 0.8s; }
        
        .voice-btn { background: white; border: 2px solid var(--primary); border-radius: 20px; padding: 8px 20px; font-size: 0.9rem; cursor: pointer; margin-top: 10px; }
        .review-btn { border: 2px solid var(--danger); background: white; color: var(--danger); padding: 8px 14px; border-radius: 14px; font-size: 0.9rem; font-weight: bold; cursor: pointer; }
        .review-btn:disabled { border-color: #ddd; color: #aaa; cursor: default; }
        
        #teaching-screen { display: none; background: white; border-radius: 30px; padding: 30px; margin: 15px 0; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center; }
        #teaching-screen.active { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .teaching-content { font-size: 1.2rem; line-height: 1.6; color: var(--text); text-align: left; }
        .concept-card { border: 2px solid #E3F1FF; background: #F8FCFF; border-radius: 16px; padding: 12px; margin: 12px 0; }
        .concept-card svg { width: 100%; max-width: 320px; height: 140px; display: block; margin: 0 auto 8px; }
        .concept-text { font-size: 1rem; line-height: 1.55; }
        .import-panel { display: none; background: #fff8ef; border: 2px solid var(--accent); border-radius: 16px; padding: 12px; margin-top: 12px; text-align: left; }
        .import-panel textarea { width: 100%; min-height: 130px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 10px; padding: 8px; font-size: 0.9rem; font-family: inherit; }
        .start-btn { background: var(--success); color: white; border: none; border-radius: 20px; padding: 15px 40px; font-size: 1.5rem; cursor: pointer; box-shadow: 0 5px 0 #6DB31D; margin-top: 20px; }
        .start-btn:active { transform: translateY(4px); box-shadow: none; }
        .mastered-tag { background: #FFD700; color: #8B4513; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: bold; margin-left: 5px; }

        .svg-container { background: #f9f9f9; border-radius: 15px; padding: 10px; margin-bottom: 10px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu" class="game-screen active">
        <h1 id="title-area">🔬 Bobo 自然大冒險</h1>
        <p id="sub-area">探索科學的奧秘</p>
        <div id="mastery-info" style="font-size: 0.9rem; color: #666;"></div>
        <div class="mission-panel" id="mission-list"></div>
        <div style="display:flex; justify-content:center; gap:10px; margin-top:20px; flex-wrap:wrap;">
            <button onclick="startMistakeReview()" id="mistake-review-btn" class="review-btn">🎯 錯題加強</button>
            <button onclick="startAssessmentReview()" id="assessment-review-btn" class="review-btn">📝 評量錯題</button>
            <button onclick="downloadReport()" style="border:1px solid #ccc; background:white; color:#666; padding:5px 10px; border-radius:10px; font-size:0.8rem;">📥 學習報表</button>
            <button onclick="exportGameMistakes()" style="border:1px solid #FF5E5E; background:white; color:#FF5E5E; padding:5px 10px; border-radius:10px; font-size:0.8rem;">📤 匯出錯題</button>
            <button onclick="toggleMistakeImport()" id="mistake-import-toggle" style="border:1px solid #F5A623; background:white; color:#C07800; padding:5px 10px; border-radius:10px; font-size:0.8rem;">📥 匯入錯題</button>
            <button onclick="toggleTgConfig()" style="border:1px solid #ccc; background:white; color:#0088cc; padding:5px 10px; border-radius:10px; font-size:0.8rem;">📢 設定通知</button>
            <button onclick="resetData()" id="reset-data-btn" style="border:none; background:none; color:#ccc; font-size:0.7rem;">清除紀錄</button>
        </div>

        <div id="mistake-import-panel" class="import-panel">
            <strong>貼上錯題 JSON 或 Telegram 錯題摘要：</strong>
            <textarea id="mistake-import-text" placeholder="可以貼匯出的 JSON，或 Telegram 裡的「題目：... Bobo答：... 正解：...」文字"></textarea>
            <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;">
                <button onclick="importMistakesFromText()" class="review-btn">匯入到錯題池</button>
                <button onclick="importAssessmentMistakesFromText()" class="review-btn">匯入評量錯題</button>
                <button onclick="generateTaskLink()" class="review-btn">產生縮網址</button>
                <button onclick="createGitHubTaskLink()" class="review-btn">建立 GitHub 短任務</button>
                <button onclick="loadDemoMistake()" class="voice-btn" style="margin-top:0;">載入測試錯題</button>
                <button onclick="loadDemoAssessmentMistakes()" class="voice-btn" style="margin-top:0;">載入評量範例</button>
                <button onclick="loadMidtermAssessmentMistakes()" class="voice-btn" style="margin-top:0;">載入六下期中錯題</button>
            </div>
            <label style="display:block; font-size:0.85rem; color:#666; margin-top:8px;">GitHub Token（只用來建立任務，不會存進題目）：</label>
            <input id="github-task-token" type="password" placeholder="貼上 GitHub token 後按「建立 GitHub 短任務」" style="width:100%; box-sizing:border-box; border:1px solid #ddd; border-radius:10px; padding:8px; font-family:inherit;">
            <div id="mistake-import-status" style="font-size:0.85rem; color:#666; margin-top:8px;"></div>
            <label id="generated-task-link-label" style="display:none; font-size:0.85rem; color:#666; margin-top:8px;">給 Bobo 的縮網址：</label>
            <textarea id="generated-task-link" readonly style="display:none; min-height:58px; margin-top:4px;"></textarea>
            <label id="generated-task-json-label" style="display:none; font-size:0.85rem; color:#666; margin-top:8px;">備用完整連結：</label>
            <textarea id="generated-task-json" readonly style="display:none; min-height:80px; margin-top:4px;"></textarea>
        </div>

        <div id="tg-config-panel" style="background: #eef; padding: 10px; border-radius: 10px; font-size: 0.7rem; margin-top: 10px; text-align: left; display: none;">
            <strong>Telegram 通知設定：</strong><br>
            Token: <input type="text" id="tg-token" placeholder="Bot Token" onchange="saveTgConfig()" style="width:100%; margin-bottom:5px; font-size:0.7rem;"><br>
            Chat ID: <input type="text" id="tg-chatid" placeholder="Chat ID" onchange="saveTgConfig()" style="width:100%; margin-bottom:5px; font-size:0.7rem;">
            <small style="color: #888;">設定後，挑戰完成會自動發送報告給家長。</small>
        </div>
    </div>

    <div id="teaching-screen" class="game-screen">
        <h2 id="teaching-title" style="color: var(--primary);"></h2>
        <div id="teaching-body" class="teaching-content"></div>
        <button onclick="handleStartButton()" class="start-btn" id="start-challenge-btn">開始挑戰</button>
    </div>

    <div id="game" class="game-screen">
        <div id="stars" style="font-size: 1.5rem; margin-bottom: 5px;"></div>
        <h2 id="mode-title" style="color: var(--primary); margin: 0;"></h2>
        <div id="question" class="question-box"></div>
        <div id="options" class="options-grid"></div>
        <div style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
            <button onclick="speakCurrentQuestion()" class="voice-btn">🔊 唸題目</button>
            <button onclick="showHint()" class="voice-btn" id="hint-btn">💡 提示</button>
        </div>
        <button onclick="goHome()" id="stop-btn" style="margin-top:15px; border:none; background:none; color:#bbb;">返回主頁</button>
    </div>
</div>

<div id="reward-screen">
    <h1 style="font-size: 5rem;">🏆</h1>
    <h2 id="reward-title">大成功！</h2>
    <div style="background:white; padding:25px; border-radius:25px; text-align:center;">
        <p id="reward-text" style="font-size: 1.5rem; margin:0;">Bobo 真是個科學小天才！</p>
        <p id="time-reward" style="font-size: 1.1rem; color: var(--success); margin-top:10px; font-weight:bold;"></p>
    </div>
    <button class="opt-btn" style="margin-top:30px; background:white; color:var(--text); padding: 15px 40px;" onclick="resetRoundAndReload()">下一關</button>
</div>

<script>
    function zy(zi, py) {
        return zi;
    }

    const ALL_UNITS = [
        {
            id: 'tools',
            title: '🏗️ '+zy('巧','ㄑㄧㄠˇ')+zy('妙','ㄇㄧㄠˋ')+zy('的','ㄉㄜ˙')+zy('工','ㄍㄨㄥ')+zy('具','ㄐㄩˋ'),
            text: '槓桿、滑輪與輪軸的奧秘',
            teaching: [
                "Bobo你看！槓桿有三個重點：支點、施力點和抗力點。如果支點離抗力點越近，就會越省力喔！",
                "滑輪有兩種：定滑輪可以改變施力方向，動滑輪可以省力。把它們組合起來就是滑輪組！",
                "輪軸就像方向盤，大的圓盤是『輪』，中間的小軸是『軸』。轉動大輪來帶動小軸，可以幫我們省下很多力氣！"
            ]
        },
        {
            id: 'micro',
            title: '🧫 '+zy('微','ㄨㄟˊ')+zy('小','ㄒㄧㄠˇ')+zy('的','ㄉㄜ˙')+zy('世','ㄕˋ')+zy('界','ㄐㄧㄝˋ'),
            text: '微生物與食物保存',
            teaching: [
                "微生物無所不在！有些微生物會讓食物腐敗，我們可以用低溫、乾燥或是加鹽的方式來防止它們生長。",
                "為什麼冰箱可以保存食物？因為低溫可以減緩微生物的生長速度喔！",
                "加鹽或是曬乾（脫水）可以讓微生物失去生存所需的水分，這樣食物就能放比較久。"
            ]
        },
        {
            id: 'change',
            title: '🧪 '+zy('物','ㄨˋ')+zy('質','ㄓˊ')+zy('的','ㄉㄜ˙')+zy('變','ㄅㄧㄢˋ')+zy('化','ㄏㄨㄚˋ'),
            text: '物理變化與化學變化',
            teaching: [
                "物理變化：只有外表或狀態改變，本質沒有變。例如：冰塊融化成水、紙張撕碎。",
                "化學變化：產生了新物質，通常不可逆。例如：鐵釘生鏽、燃燒、食物煮熟。",
                "鐵為什麼會生鏽？是因為鐵遇到了空氣中的氧氣和水分，產生了『氧化鐵』這種新物質！"
            ]
        },
        {
            id: 'ecology',
            title: '🌿 '+zy('我','ㄨㄛˇ')+zy('們','ㄇㄣ˙')+zy('的','ㄉㄜ˙')+zy('環','ㄏㄨˊ')+zy('境','ㄐㄧㄥˋ'),
            text: '生態系與食物鏈',
            teaching: [
                "食物鏈的開始通常是『生產者』（植物），它們會利用光合作用製造養分。",
                "吃植物的叫『初級消費者』，吃動物的叫『次級消費者』。最後還有『分解者』負責回收營養。",
                "如果食物鏈中的某個環節消失了，會影響到整個生態系的平衡喔！所以我們要愛護環境。"
            ]
        },
        {
            id: 'space',
            title: '🌍 '+zy('地','ㄉㄧˋ')+zy('球','ㄑㄧㄡˊ')+zy('與','ㄩˇ')+zy('宇','ㄩˇ')+zy('宙','ㄓㄡˋ'),
            text: '地球運動與月相',
            teaching: [
                "地球會『自轉』，一圈大約是 24 小時，這造成了白晝與黑夜的交替。",
                "地球還會繞著太陽『公轉』，一圈大約是一年，這造成了四季的變化喔！",
                "月亮的形狀為什麼會變？是因為月球繞著地球公轉，我們看到的受光面不同，這叫『月相變化』。"
            ]
        },
        {
            id: 'nature',
            title: '🌦️ '+zy('自','ㄗˋ')+zy('然','ㄖㄢˊ')+zy('現','ㄒㄧㄢˋ')+zy('象','ㄒㄧㄤˋ'),
            text: '水循環、光與聲音',
            teaching: [
                "水在地球上不斷循環：蒸發變成水蒸氣，凝結成雲，最後降雨回到地面。",
                "光走直線，但遇到水或玻璃會產生『折射』，讓水中的魚看起來比較淺。",
                "聲音是靠振動產生的，而且需要介質（固體、液體、氣體）才能傳播，真空中是聽不到聲音的！"
            ]
        }
    ];

    const QUESTION_BANK = {
        tools: [
            { q: "使用下列哪種滑輪時，可以『省力』，但不能改變施力方向？", a: "動滑輪", o: ["定滑輪", "動滑輪", "滑輪組", "齒輪"] },
            { q: "使用剪刀剪紙時，剪刀是屬於哪種簡單機械？", a: "槓桿", o: ["槓桿", "輪軸", "斜面", "滑輪"] },
            { q: "關於槓桿，支點在中間的工具是？", a: "翹翹板", o: ["翹翹板", "開瓶器", "鑷子", "筷子"] },
            { q: "轉動螺絲起子時，手握的手把部分是屬於？", a: "輪", o: ["輪", "軸", "支點", "施力點"] },
            { q: "下列何者可以『改變施力方向』但不省力？", a: "定滑輪", o: ["定滑輪", "動滑輪", "斜面", "輪軸"] },
            { q: "要讓一顆燈泡亮起來，最基本的簡單電路至少需要哪三樣元件？", a: "電池、導線、燈泡", o: ["電池、導線、燈泡", "電池、開關、燈泡", "電池、導線、電池座", "導線、燈泡、電池座"] },
            { q: "串聯電路中，如果一個燈泡壞了，其他燈泡還會亮嗎？", a: "不會亮", o: ["不會亮", "會亮", "變得更亮", "有時候會亮"] },
            { q: "並聯電路中，如果其中一個燈泡壞了，其他燈泡還會亮嗎？", a: "會亮", o: ["會亮", "不會亮", "變得更暗", "會閃爍"] },
            { q: "使電磁鐵磁力增強的方法有哪兩種？", a: "增加線圈匝數、增加電流", o: ["增加線圈匝數、增加電流", "減少線圈匝數、增加電流", "增加線圈匝數、減少電流", "改變電流方向、減少線圈"] },
            { q: "在電路中，下列哪種材料是『良導體』？", a: "銅線", o: ["銅線", "橡皮擦", "木頭", "塑膠"] }
        ],
        micro: [
            { q: "下列哪種方法是利用『降低溫度』來保存食物？", a: "放在冰箱冷凍", o: ["放在冰箱冷凍", "加入大量的鹽", "放在陽光下曝曬", "真空包裝"] },
            { q: "食物腐敗主要是由什麼引起的？", a: "微生物生長", o: ["微生物生長", "陽光直射", "水分蒸發", "包裝破損"] },
            { q: "為什麼曬乾的香菇可以放很久？", a: "因為脫水讓微生物不易生存", o: ["因為脫水讓微生物不易生存", "因為香菇變硬了", "因為顏色變深了", "因為香味變濃了"] },
            { q: "製作蜜餞是利用哪種原理保存？", a: "利用糖降低水活性", o: ["利用糖降低水活性", "降低溫度", "隔絕空氣", "高溫殺菌"] },
            { q: "下列何者屬於有益的微生物應用？", a: "利用酵母菌發酵麵包", o: ["利用酵母菌發酵麵包", "食物發霉", "鐵釘生鏽", "木頭朽"] },
            { q: "食物在胃裡消化，被酵素分解成不同的分子，這是屬於什麼變化？", a: "化學變化", o: ["化學變化", "物理變化", "狀態變化", "外形變化"] },
            { q: "牛奶加入醋後變得濃稠結塊，這是什麼變化？", a: "化學變化", o: ["化學變化", "物理變化", "蒸發現象", "凝結現象"] },
            { q: "用鹽醃製食物可以保存較久，主要原因是什麼？", a: "降低微生物可利用的水分", o: ["降低微生物可利用的水分", "讓食物完全沒有空氣", "讓食物變成金屬", "讓食物不再有重量"] },
            { q: "真空包裝能延長食物保存，主要是減少哪一項條件？", a: "空氣中的氧氣", o: ["空氣中的氧氣", "食物中的顏色", "食物的形狀", "包裝的重量"] },
            { q: "下列哪一種方法可以用高溫殺死部分微生物來保存食物？", a: "加熱殺菌", o: ["加熱殺菌", "放在桌上", "增加水分", "打開包裝"] }
        ],
        change: [

    function mistakePracticeBank() {
        const seen = new Set();
        return [...roundState.mistakes].reverse().reduce((items, mistake) => {
            if (!mistake.question || seen.has(mistake.question)) return items;
            const original = findQuestionByText(mistake.question);
            if (!original) return items;
            seen.add(mistake.question);
            items.push({ ...original, reviewUnitTitle: mistake.unitTitle || "錯題" });
            return items;
        }, []);
    }

    function assessmentPracticeBank() {
        const seen = new Set();
        return [...assessmentState.mistakes].reverse().reduce((items, mistake) => {
            if (!mistake.question || !mistake.correct || seen.has(mistake.question)) return items;
            seen.add(mistake.question);
            items.push(externalQuestionFromRecord(mistake));
            return items;
        }, []);

        if (q.includes("光") || q.includes("折射") || q.includes("反射") || q.includes("影子") || q.includes("彩虹") || q.includes("魚")) {
            return [
                { q: "筷子插入水中看起來彎折，主要是因為光發生什麼現象？", a: "折射", o: ["折射", "燃燒", "蒸散", "串聯"] },
                { q: "照鏡子時看到自己的影像，主要是因為光發生什麼現象？", a: "反射", o: ["反射", "凝結", "生鏽", "發酵"] }
            ];

        if (q.includes("水循環") || q.includes("降水") || q.includes("凝結") || q.includes("蒸發") || q.includes("鹽水") || q.includes("陽光") || q.includes("寬口") || q.includes("颱風")) {
            return [

            ];
        }
        return [];

    function inferAssessmentConcept(record) {
        const text = `${record.concept || ""} ${record.question || ""} ${record.correct || ""}`;
        if (text.includes("齒輪") || text.includes("鏈條")) return { key: "gear", label: "齒輪傳動" };
        if (text.includes("輪軸") || text.includes("摩天輪") || text.includes("方向盤") || text.includes("螺絲起子")) return { key: "wheel", label: "輪軸" };
        if (text.includes("滑輪") || text.includes("定滑輪") || text.includes("動滑輪")) return { key: "pulley", label: "滑輪" };
        if (text.includes("槓桿") || text.includes("支點") || text.includes("施力點") || text.includes("抗力點")) return { key: "lever", label: "槓桿" };
        if (text.includes("鳥") || text.includes("羽毛") || text.includes("喙") || text.includes("卵生")) return { key: "bird", label: "鳥類特徵" };
        if (text.includes("生態") || text.includes("棲地") || text.includes("保育") || text.includes("生物")) return { key: "foodchain", label: "生態與保育" };
        if (text.includes("聲音") || text.includes("噪音") || text.includes("音調") || text.includes("響度") || text.includes("樂器")) return { key: "sound", label: "聲音與噪音" };
        return { key: "general", label: record.concept || "評量錯題觀念" };
    }

        const pools = {

            wheel: ["輪軸", "輪", "軸", "轉動時輪和軸會一起轉"],
            pulley: ["定滑輪", "動滑輪", "改變施力方向", "省力"],
            lever: ["支點", "施力點", "抗力點", "槓桿"],
            bird: ["有羽毛", "有喙", "卵生", "多數會飛"],
            foodchain: ["保護棲地", "維持生態平衡", "減少人為干擾", "尊重野生動物"],
            sound: ["振動幅度影響響度", "振動快慢影響音調", "音箱可以共鳴放大聲音", "阻隔或吸收可以減少噪音"],
            general: ["觀察關鍵詞", "回到核心概念", "排除不合條件的選項", "比較題目條件"]
        };
        return pools[conceptKey] || pools.general;
    }

    function makeAssessmentOptions(record, conceptKey) {
        const correct = record.correct;
        const rawOptions = record.options || record.o || [];
        const options = rawOptions.map(String).filter(Boolean);
        if (correct && !options.includes(correct)) options.unshift(correct);
        assessmentOptionPool(conceptKey).forEach(option => {
            if (options.length < 4 && option !== correct && !options.includes(option)) options.push(option);
        });
        ["輪軸", "槓桿", "滑輪", "齒輪", "鳥類", "生態系"].forEach(option => {
            if (options.length < 4 && option !== correct && !options.includes(option)) options.push(option);
        });
        return options.slice(0, 4);
    }

        const inferred = inferAssessmentConcept(record);

    function buildMistakeReviewQueue(bank) {
        const groups = [];
        const byConcept = new Map();
        bank.forEach(item => {
            const key = conceptKey(item);
            if (!byConcept.has(key)) {
                const group = { key, items: [], originalQuestions: [] };
                byConcept.set(key, group);
                groups.push(group);
            }
            const group = byConcept.get(key);
            group.items.push(item);
            group.originalQuestions.push(item.q);
        });
        return groups.flatMap((group, groupIndex) => {
            const representative = group.items[0];
            const originalQuestions = [...new Set(group.originalQuestions)];
            const conceptCard = {
                type: "concept",
                conceptKey: group.key,
                conceptText: representative.teach || conceptExplanation(representative),
                conceptIndex: groupIndex + 1,
                conceptTotal: groups.length,
                originalQuestions
            };
            const originals = group.items.map((item, index) => ({
                ...item,
                originalQuestion: item.q,
                originalQuestions,
                conceptKey: group.key,
                reviewKind: group.items.length > 1 ? `原錯題 ${index + 1}` : "原錯題"
            }));
            const variations = (representative.source ? assessmentVariationQuestions(representative) : variationQuestions(representative)).map((variation, index) => ({
                ...variation,
                originalQuestion: representative.q,
                originalQuestions,
                conceptKey: group.key,
                reviewKind: `變化題 ${index + 1}`,
                reviewUnitTitle: representative.reviewUnitTitle || "錯題"
            }));
            return [conceptCard, ...originals, ...variations];
        });
    }

    function addMistakeRecord(record) {
        if (!record || !record.question) return false;
        const original = findQuestionByText(record.question);
        if (!original) return false;
        const exists = roundState.mistakes.some(m => m.question === original.q);
        if (exists) return false;
        roundState.mistakes.push({
            unit: record.unit || "imported",
            unitTitle: record.unitTitle || "匯入錯題",
            question: original.q,
            wrong: record.wrong || "未記錄",
            correct: record.correct || original.a,
            time: record.time || new Date().toLocaleString()
        });
        safeSaveState();
        return true;
    }

    function addAssessmentMistakeRecord(record) {
        if (!record || !record.question || !record.correct) return false;
        const inferred = inferAssessmentConcept(record);

        const exists = assessmentState.mistakes.some(m => m.question === question);
        if (exists) return false;
        assessmentState.mistakes.push({

            wrong: record.wrong || "未記錄",
            correct: String(record.correct).trim(),
            options: record.options || record.o || [],
            concept: record.concept || inferred.label,
            conceptKey: record.conceptKey || inferred.key,
            teach: record.teach || record.explanation || "",
            variations: record.variations || [],
            time: record.time || new Date().toLocaleString()
        });

        return true;
    }

    function parseMistakeImportText(text) {
        const trimmed = text.trim();
        if (!trimmed) return [];
        try {
            const parsed = JSON.parse(trimmed);
            const items = Array.isArray(parsed) ? parsed : (Array.isArray(parsed.records) ? parsed.records : [parsed]);
            return items.map(item => ({
                unit: item.unit,
                unitTitle: item.unitTitle,
                source: item.source,
                question: item.question || item.q,
                wrong: item.wrong,
                correct: item.correct || item.a,
                options: item.options || item.o,
                concept: item.concept,
                conceptKey: item.conceptKey,
                teach: item.teach || item.explanation,
                variations: item.variations,
                time: item.time
            })).filter(item => item.question);
        } catch (e) {
            const lines = trimmed.split(/\n+/).map(line => line.trim()).filter(Boolean);
            const records = [];
            lines.forEach(line => {
                const questionMatch = line.match(/題目[:：]\s*(.+?)(?:\s+Bobo答|$)/);
                if (!questionMatch) return;
                const wrongMatch = line.match(/Bobo答[:：]\s*(.+?)(?:\s*\(|\s+正解|$)/);
                const correctMatch = line.match(/正解[:：]\s*(.+?)\)?$/);
                records.push({
                    unitTitle: "Telegram 匯入",
                    question: questionMatch[1].trim(),
                    wrong: wrongMatch ? wrongMatch[1].trim() : "未記錄",
                    correct: correctMatch ? correctMatch[1].trim() : ""
                });
            });
            return records;
        }
    }

    function toBase64Url(text) {
        const bytes = new TextEncoder().encode(text);
        let binary = "";
        bytes.forEach(byte => binary += String.fromCharCode(byte));
        return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    function toBase64(text) {
        const bytes = new TextEncoder().encode(text);
        let binary = "";
        bytes.forEach(byte => binary += String.fromCharCode(byte));
        return btoa(binary);
    }

    function fromBase64Url(text) {
        const base64 = text.replace(/-/g, "+").replace(/_/g, "/") + "=".repeat((4 - text.length % 4) % 4);
        const binary = atob(base64);
        const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
        return new TextDecoder().decode(bytes);
    }

    function taskPageUrl() {
        if (location.protocol === "http:" || location.protocol === "https:") {

    function shortenUrl(longUrl) {
        return new Promise((resolve, reject) => {
            const callbackName = `boboShortUrl${Date.now()}${Math.floor(Math.random() * 1000)}`;
            const script = document.createElement('script');
            const cleanup = () => {
                delete window[callbackName];
                script.remove();
            };
            const timer = setTimeout(() => {
                cleanup();
                reject(new Error("shortener timeout"));
            }, 8000);
            window[callbackName] = data => {
                clearTimeout(timer);
                cleanup();
                if (data && data.shorturl) {
                    resolve(data.shorturl);
                } else {
                    reject(new Error(data?.errormessage || "shortener failed"));
                }
            };
            script.onerror = () => {
                clearTimeout(timer);
                cleanup();
                reject(new Error("shortener network error"));
            };
            script.src = `https://is.gd/create.php?format=json&callback=${callbackName}&url=${encodeURIComponent(longUrl)}`;
            document.body.appendChild(script);
        });
    }

    function makeTaskId() {
        const now = new Date();
        const taipei = new Date(now.toLocaleString("en-US", { timeZone: "Asia/Taipei" }));

        const date = `${taipei.getFullYear()}${pad(taipei.getMonth() + 1)}${pad(taipei.getDate())}`;
        const time = `${pad(taipei.getHours())}${pad(taipei.getMinutes())}${pad(taipei.getSeconds())}`;

    function taskFileUrl(taskId) {
        const safeId = (taskId || "").replace(/[^a-zA-Z0-9_-]/g, "");

    function importTaskRecords(records) {
        let imported = 0;
        let assessmentImported = 0;
        records.forEach(record => {
            const looksLikeAssessment = record.source || record.concept || record.conceptKey || record.teach || record.options;
            if (looksLikeAssessment && addAssessmentMistakeRecord(record)) {
                assessmentImported++;
            } else if (addMistakeRecord(record)) {

        const resetBtn = document.getElementById('reset-data-btn');
        if (importToggle) importToggle.style.display = 'none';
        if (resetBtn) resetBtn.style.display = 'none';

    }

    async function loadTaskFromUrl() {
        const params = new URLSearchParams(location.search);
        const taskId = params.get("task");
        const taskVersion = params.get("v") || Date.now().toString();
        const taskData = params.get("taskData");
        if (!taskId && !taskData) return;
        let records = [];
        if (taskId) {
            try {
                const response = await fetch(`${taskFileUrl(taskId)}?v=${encodeURIComponent(taskVersion)}`, { cache: "no-store" });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const payload = await response.json();
                records = Array.isArray(payload.records) ? payload.records : [];
            } catch (e) {
                console.warn("Could not load task file:", e);
                const masteryInfo = document.getElementById('mastery-info');
                if (masteryInfo) masteryInfo.innerText = "找不到這份錯題任務，請確認任務 JSON 已經放到 tasks 資料夾。";
                return;
            }
        }
        if (!records.length && taskData) {
            try {
                const payload = JSON.parse(fromBase64Url(taskData));
                records = Array.isArray(payload.records) ? payload.records : [];
            } catch (e) {
                console.warn("Could not load task data:", e);
            }
        }
        if (history.replaceState) history.replaceState(null, "", location.pathname);
        importTaskRecords(records);
    }

    function conceptExplanation(qData) {
        const q = qData.q;
        if (q.includes("螺絲起子") || q.includes("手把")) {
            return "輪軸題要先分清楚「輪」和「軸」：手握、比較大的圓形或粗的部分通常是輪；中間比較細、被帶動旋轉的部分是軸。";
        }
        if (q.includes("齒輪") || q.includes("鏈條") || q.includes("轉速") || q.includes("大齒輪") || q.includes("小齒輪")) {
            return "齒輪題先看咬合和大小：相鄰齒輪轉動方向相反；大齒輪帶小齒輪時，小齒輪通常轉得比較快。";
        }
        if (q.includes("鳥") || q.includes("羽毛") || q.includes("喙") || q.includes("飛行") || q.includes("卵生")) {
            return "鳥類題先抓共同特徵：有羽毛、有喙、卵生、多數會飛，但不是每一種鳥都很會飛。";
        }
        if (q.includes("省力") && q.includes("施力方向")) {
            return "滑輪題先分兩件事：定滑輪主要改變施力方向，動滑輪主要省力，滑輪組可能同時有兩種效果。";
        }
        if (q.includes("槓桿") || q.includes("剪刀") || q.includes("支點")) {
            return "槓桿一定有支點、施力點、抗力點。判斷工具時，先找它繞著哪裡轉，再看力是從哪裡用、哪裡被移動。";
        }
        if (q.includes("電路") || q.includes("燈泡") || q.includes("導體") || q.includes("電磁鐵")) {
            return "電路題先看電流路徑有沒有完整。電磁鐵磁力跟線圈匝數和電流大小有關；導體則是讓電流容易通過的材料。";
        }
        if (q.includes("保存") || q.includes("腐敗") || q.includes("微生物") || q.includes("蜜餞") || q.includes("曬乾") || q.includes("真空") || q.includes("殺菌")) {
            return "食物保存的核心是讓微生物不容易生長：降低溫度、減少水分、增加糖或鹽、隔絕氧氣、加熱殺菌都可能有幫助。";
        }
        if (q.includes("物理變化") || q.includes("化學變化") || q.includes("生鏽") || q.includes("燃燒") || q.includes("融化") || q.includes("蒸發") || q.includes("煎熟") || q.includes("腐爛")) {
            return "物理變化通常只是形狀或狀態改變；化學變化會產生新物質，例如燃燒、生鏽、腐爛、煮熟。";
        }
        if (q.includes("食物鏈") || q.includes("生產者") || q.includes("消費者") || q.includes("分解者") || q.includes("光合作用") || q.includes("生態系")) {
            return "生態題先找角色：植物多半是生產者，吃植物的是初級消費者，真菌和細菌常是分解者；任何一環改變都會影響其他生物。";
        }
        if (q.includes("變因") || q.includes("實驗")) {
            return "實驗變因要分三種：研究者主動改的是操縱變因，觀察到的結果是應變變因，其他要維持一樣的是控制變因。";
        }
        if (q.includes("自轉") || q.includes("公轉") || q.includes("月相") || q.includes("月食") || q.includes("日食")) {
            return "地球自轉造成晝夜，地球公轉造成一年和四季。日食是月球擋住太陽光，月食是地球擋住太陽照到月球的光。";
        }
        if (q.includes("岩石") || q.includes("化石")) {
            return "岩石依形成方式判斷：岩漿冷卻是火成岩，沉積物壓實是沉積岩，高溫高壓改變是變質岩；化石常出現在沉積岩。";
        }
        if (q.includes("聲音") || q.includes("介質") || q.includes("振動")) {
            return "聲音來自物體振動，傳播需要介質。通常在固體傳最快，液體其次，氣體較慢，真空不能傳聲。";
        }
        if (q.includes("光") || q.includes("折射") || q.includes("反射") || q.includes("影子") || q.includes("彩虹") || q.includes("魚")) {
            return "光學題先分反射和折射：反射是光彈回來，折射是光進入不同介質時方向改變；彩虹還和色散有關。";
        }
        if (q.includes("水循環") || q.includes("降水") || q.includes("凝結") || q.includes("蒸發") || q.includes("鹽水") || q.includes("陽光") || q.includes("寬口") || q.includes("颱風")) {
            return "水與天氣題先抓條件：蒸發快慢常看溫度、風速、表面積；水循環包含蒸發、凝結和降水。";
        }
        return "先抓題目的關鍵詞，再回到這個單元的核心概念。錯題加強不是背答案，而是確認同一個觀念真的懂了。";
    }

    function conceptKey(qData) {
        if (qData.conceptKey) return qData.conceptKey;
        const q = qData.q;
        if (q.includes("螺絲起子") || q.includes("手把")) return "wheel";
        if (q.includes("齒輪") || q.includes("鏈條") || q.includes("轉速") || q.includes("大齒輪") || q.includes("小齒輪")) return "gear";
        if (q.includes("鳥") || q.includes("羽毛") || q.includes("喙") || q.includes("飛行") || q.includes("卵生")) return "bird";
        if (q.includes("省力") && q.includes("施力方向")) return "pulley";
        if (q.includes("槓桿") || q.includes("剪刀") || q.includes("支點")) return "lever";
        if (q.includes("電磁鐵")) return "magnet";
        if (q.includes("電路") || q.includes("燈泡") || q.includes("導體")) return "circuit";
        if (q.includes("保存") || q.includes("腐敗") || q.includes("微生物") || q.includes("蜜餞") || q.includes("曬乾") || q.includes("真空") || q.includes("殺菌")) return "microbe";
        if (q.includes("物理變化") || q.includes("化學變化") || q.includes("生鏽") || q.includes("燃燒") || q.includes("融化") || q.includes("蒸發") || q.includes("煎熟") || q.includes("腐爛")) return "change";
        if (q.includes("食物鏈") || q.includes("生產者") || q.includes("消費者") || q.includes("分解者") || q.includes("光合作用") || q.includes("生態系")) return "foodchain";
        if (q.includes("變因") || q.includes("實驗")) return "variables";
        if (q.includes("自轉") || q.includes("公轉") || q.includes("月相") || q.includes("月食") || q.includes("日食")) return "space";
        if (q.includes("岩石") || q.includes("化石")) return "rocks";
        if (q.includes("聲音") || q.includes("介質") || q.includes("振動")) return "sound";
        if (q.includes("光") || q.includes("折射") || q.includes("反射") || q.includes("影子") || q.includes("彩虹") || q.includes("魚")) return "light";
        if (q.includes("水循環") || q.includes("降水") || q.includes("凝結") || q.includes("蒸發") || q.includes("鹽水") || q.includes("陽光") || q.includes("寬口") || q.includes("颱風")) return "water";
        return "general";
    }

    function mistakeConceptIntro(bank) {
        const unique = [];
        const seen = new Set();
        bank.forEach(item => {
            const key = conceptKey(item);
            if (seen.has(key)) return;
            seen.add(key);
            unique.push({ key, text: conceptExplanation(item) });
        });
        const cards = unique.slice(0, 4).map((item, index) => `
            <div class="concept-card">
                ${conceptDiagram(item.key)}
                <div class="concept-text"><strong>${index + 1}. 觀念原理</strong><br>${item.text}</div>
            </div>
        `).join('');
        return `<div class="concept-text"><strong>先看圖解，再做錯題。</strong></div>${cards}`;
    }

    function shuffleItems(items) {
        const arr = [...items];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function refillQuestionQueue() {
        if (!currentUnit) return;
        if (isMistakeMode) {
            questionQueue = [];
            return;
        }
        const bank = QUESTION_BANK[currentUnit.id] || [];
        questionQueue = shuffleItems(bank);
        if (questionQueue.length > 1 && questionQueue[0].q === lastQuestionText) {
            const swapIndex = questionQueue.findIndex(item => item.q !== lastQuestionText);
            if (swapIndex > 0) {
                [questionQueue[0], questionQueue[swapIndex]] = [questionQueue[swapIndex], questionQueue[0]];
            }
        }
    }

    function getNextQuestion() {
        if (isMistakeMode && !questionQueue.length) return null;
        if (!questionQueue.length) refillQuestionQueue();
        const qData = questionQueue.shift();
        lastQuestionText = qData ? qData.q : "";
        return qData;
    }

    function generateQuestion() {
        isProcessingAnswer = false;
        isFirstAttempt = true;
        hintCountInQuestion = 0;
        const qEl = document.getElementById('question');
        const oEl = document.getElementById('options');
        qEl.innerHTML = '';
        oEl.innerHTML = '';
        const oldFeedback = document.getElementById('feedback');
        if (oldFeedback) oldFeedback.remove();
        const oldHint = document.getElementById('hint-text');
        if (oldHint) oldHint.remove();
        document.getElementById('hint-btn').disabled = false;

        const qData = getNextQuestion();
        if (!qData) {
            qEl.innerText = "這個單元還沒有題目。";
            document.getElementById('hint-btn').disabled = true;
            return;
        }

        if (qData.type === "concept") {
            isProcessingAnswer = false;
            currentQuestionText = "";
            currentQuestionData = qData;
            correctAnswer = null;
            currentHints = [];
            document.getElementById('hint-btn').disabled = true;
            qEl.innerHTML = `
                <div style="font-size:0.95rem; color:#888; margin-bottom:6px;">觀念 ${qData.conceptIndex} / ${qData.conceptTotal}</div>
                <div class="concept-card" style="width:100%; box-sizing:border-box;">
                    ${conceptDiagram(qData.conceptKey)}
                    <div class="concept-text"><strong>先看懂這個觀念</strong><br>${qData.conceptText}</div>
                </div>
            `;
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = "開始這個觀念練習";
            btn.onclick = () => generateQuestion();
            oEl.appendChild(btn);
            return;
        }
        
        currentQuestionText = qData.q;
        currentQuestionData = qData;
        correctAnswer = qData.a;
        currentHints = makeHints(qData);
        qEl.innerText = qData.reviewKind ? `${qData.reviewKind}：${qData.q}` : qData.q;

        const shuffledOptions = shuffleItems(qData.o);
        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, btn);
            oEl.appendChild(btn);
        });
        const feedback = document.createElement('div');
        feedback.id = 'feedback';
        feedback.className = 'feedback';
        oEl.after(feedback);
    }

    function checkAnswer(val, btn) {
        if (isProcessingAnswer) return;
        isProcessingAnswer = true;
        const feedback = document.getElementById('feedback');

        if (val === correctAnswer) {
            document.querySelectorAll('#options .opt-btn').forEach(b => {
                b.disabled = true;
                if (b.innerText === correctAnswer) b.classList.add('correct');
            });
            currentStep++;
            if (isFirstAttempt) {
                if (!isMistakeMode) {
                    roundState.streaks[currentUnit.id] = (roundState.streaks[currentUnit.id] || 0) + 1;
                    updateRecentResults(true);
                }
            }
            updateStars();
            confetti({ particleCount: 50, spread: 40, origin: { y: 0.8 } });
            if (feedback) feedback.innerText = "答對了，下一題。";
            
            if (currentStep >= targetQuestionCount) {
                const duration = Math.floor((new Date() - challengeStartTime) / 1000);
                const phoneTime = Math.floor(duration / 30) + 5; 
                
                if (!isMistakeMode && !roundState.completedUnits.includes(currentUnit.id)) {
                    roundState.completedUnits.push(currentUnit.id);
                }
                if (isMistakeMode) {
                    reviewOriginalQuestions.forEach(questionText => {
                        if (!reviewFailedOriginals.has(questionText)) {
                            if (reviewSource === "assessment") {
                                removeAssessmentMistakeQuestion(questionText);
                            } else {
                                removeMistakeQuestion(questionText);
                            }
                        }
                    });
                }
                safeSaveState();

                const learnedCount = isMistakeMode ? reviewTotalOriginals - reviewFailedOriginals.size : 0;
                const remainingCount = isMistakeMode ? (reviewSource === "assessment" ? assessmentPracticeBank().length : mistakePracticeBank().length) : 0;
                document.getElementById('reward-title').innerText = isMistakeMode ? (reviewSource === "assessment" ? "評量錯題完成！" : "錯題加強完成！") : "大成功！";
                document.getElementById('reward-text').innerText = isMistakeMode ? `原本 ${reviewTotalOriginals} 題，這輪學會 ${learnedCount} 題。` : "Bobo 真是個科學小天才！";
                document.getElementById('time-reward').innerText = isMistakeMode ? `剩餘錯題：${remainingCount} 題，可以回首頁再挑戰一次。` : `🎁 獲得 ${phoneTime} 分鐘玩手機時間！`;
                sendTgNotification(cleanTitle(currentUnit.title), duration, phoneTime);
                setTimeout(showReward, 1000);
            } else { 
                setTimeout(generateQuestion, 1000); 
            }
        } else {
            if (btn) {
                btn.classList.add('wrong');
                btn.disabled = true;
            }
            if (isFirstAttempt) {
                const mistake = {
                    unit: currentUnit.id,
                    unitTitle: cleanTitle(currentUnit.title),
                    question: currentQuestionText,
                    wrong: val,
                    correct: correctAnswer,
                    time: new Date().toLocaleString()
                };
                sessionMistakes.push(mistake);
                if (isMistakeMode) {
                    const originals = currentQuestionData.originalQuestions || [currentQuestionData.originalQuestion || currentQuestionText];
                    originals.forEach(questionText => reviewFailedOriginals.add(questionText));
                } else {
                    roundState.mistakes.push(mistake);
                    roundState.streaks[currentUnit.id] = 0;
                    updateRecentResults(false);
                    safeSaveState();
                }
            }
            isFirstAttempt = false;
            updateStars();
            if (feedback) feedback.innerText = "這個不是答案，換一個選項試試。";
            document.getElementById('question').style.background = '#FFEBEB';
            setTimeout(() => { 
                document.getElementById('question').style.background = 'white'; 
                isProcessingAnswer = false;
            }, 500);
        }
    }

    function showHint() {
        hintCountInQuestion++;
        const hint = currentHints[Math.min(hintCountInQuestion - 1, currentHints.length - 1)] || `這題考的是我們剛才在單元裡學過的觀念喔！再仔細讀一下題目。`;
        if (hintCountInQuestion >= currentHints.length) {
            document.getElementById('hint-btn').disabled = true;
        }
        const oldHint = document.getElementById('hint-text');
        if (oldHint) oldHint.remove();
        const hintDiv = document.createElement('div');
        hintDiv.id = 'hint-text';
        hintDiv.style.cssText = "margin-top:12px; padding:10px; border-radius:12px; background:#EEF7FF; color:#2C3E50; font-size:0.95rem; line-height:1.5;";
        hintDiv.innerText = `提示 ${Math.min(hintCountInQuestion, currentHints.length)}：${hint}`;
        document.getElementById('question').appendChild(hintDiv);
    }

    async function generateTaskLink() {
        const input = document.getElementById('mistake-import-text');
        const status = document.getElementById('mistake-import-status');
        const linkOutput = document.getElementById('generated-task-link');
        const backupOutput = document.getElementById('generated-task-json');
        const linkLabel = document.getElementById('generated-task-link-label');
        const backupLabel = document.getElementById('generated-task-json-label');
        const records = parseMistakeImportText(input.value).filter(record => record.question && record.correct);
        if (!records.length) {
            status.innerText = "沒有可產生任務連結的錯題。請確認每筆至少有題目和正解。";
            [linkOutput, backupOutput, linkLabel, backupLabel].forEach(el => {
                if (el) el.style.display = 'none';
            });
            return;
        }
        const payload = {
            type: "bobo-science-review",
            createdAt: new Date().toISOString(),
            records
        };
        const fullLink = `${taskPageUrl()}?taskData=${toBase64Url(JSON.stringify(payload))}`;
        status.innerText = `正在縮短任務連結，內含 ${records.length} 題錯題...`;
        let shareLink = fullLink;
        let shortened = false;
        try {
            shareLink = await shortenUrl(fullLink);
            shortened = true;
        } catch (e) {
            console.warn("Could not shorten task link:", e);
        }
        if (linkLabel) linkLabel.style.display = 'block';
        if (backupLabel) backupLabel.style.display = shortened ? 'block' : 'none';
        if (linkOutput) {
            linkOutput.style.display = 'block';
            linkOutput.value = shareLink;
            linkOutput.focus();
            linkOutput.select();
        }
        if (backupOutput) {
            backupOutput.style.display = shortened ? 'block' : 'none';
            backupOutput.value = fullLink;
        }
        if (navigator.clipboard && location.protocol !== "file:") {
            navigator.clipboard.writeText(shareLink).catch(() => {});
        }
        status.innerText = shortened
            ? `已產生縮網址，內含 ${records.length} 題錯題。把上面的縮網址傳給 Bobo，他打開就會進錯題加強。`
            : `縮網址服務暫時無法使用，已改產生完整任務連結，內含 ${records.length} 題錯題。`;
    }

    async function createGitHubTaskLink() {
        const input = document.getElementById('mistake-import-text');
        const status = document.getElementById('mistake-import-status');
        const linkOutput = document.getElementById('generated-task-link');
        const backupOutput = document.getElementById('generated-task-json');
        const linkLabel = document.getElementById('generated-task-link-label');
        const backupLabel = document.getElementById('generated-task-json-label');
        const tokenInput = document.getElementById('github-task-token');
        const token = (tokenInput?.value || "").trim();
        const records = parseMistakeImportText(input.value).filter(record => record.question && record.correct);
        if (!records.length) {
            status.innerText = "沒有可建立 GitHub 任務的錯題。請確認每筆至少有題目和正解。";
            return;
        }
        if (!token) {
            status.innerText = "請先貼上 GitHub token，才能一鍵建立 GitHub 任務。";
            tokenInput?.focus();
            return;
        }
        const taskId = makeTaskId();
        const payload = {
            type: "bobo-science-review",
            id: taskId,
            createdAt: new Date().toISOString(),
            records
        };
        const path = `source_materials/desktop-bobo/tasks/${taskId}.json`;
        const body = {
            message: `新增自然錯題任務 ${taskId}`,
            content: toBase64(JSON.stringify(payload, null, 2)),
            branch: "main"
        };
        status.innerText = `正在建立 GitHub 短任務 ${taskId}，共 ${records.length} 題...`;
        try {
            const response = await fetch(`https://api.github.com/repos/jammieaiwriter-jpg/bobo/contents/${path}`, {
                method: "PUT",
                headers: {
                    "Accept": "application/vnd.github+json",
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json",
                    "X-GitHub-Api-Version": "2022-11-28"
                },
                body: JSON.stringify(body)
            });
            const result = await response.json();
            if (!response.ok) throw new Error(result.message || `GitHub HTTP ${response.status}`);
            const link = `${taskPageUrl()}?task=${encodeURIComponent(taskId)}&v=${encodeURIComponent(taskId)}`;
            if (linkLabel) {
                linkLabel.style.display = 'block';
                linkLabel.innerText = "給 Bobo 的 GitHub 短任務網址：";
            }
            if (linkOutput) {
                linkOutput.style.display = 'block';
                linkOutput.value = link;
                linkOutput.focus();
                linkOutput.select();
            }
            if (backupLabel) {
                backupLabel.style.display = 'block';
                backupLabel.innerText = "GitHub 任務檔：";
            }
            if (backupOutput) {
                backupOutput.style.display = 'block';
                backupOutput.value = result.content?.html_url || path;
            }
            if (navigator.clipboard && location.protocol !== "file:") {
                navigator.clipboard.writeText(link).catch(() => {});
            }
            status.innerText = `已建立 GitHub 短任務，內含 ${records.length} 題。把上面的短任務網址傳給 Bobo。`;
        } catch (e) {
            console.error("Could not create GitHub task:", e);
            status.innerText = `建立 GitHub 任務失敗：${e.message}`;
        }
    }

    function loadMidtermAssessmentMistakes() {
        document.getElementById('mistake-import-text').value = JSON.stringify(midtermAssessmentMistakeRecords(), null, 2);
        importAssessmentMistakesFromText();
    }

    function downloadReport() {
        let md = "# 🔬 Bobo 自然冒險學習報表\n\n";
        md += `目前完成單元：${roundState.completedUnits.length} / ${ALL_UNITS.length}\n`;
        roundState.completedUnits.forEach(id => {
            const u = ALL_UNITS.find(x => x.id === id);
            md += `- ✅ ${cleanTitle(u.title)}\n`;
        });
        md += "\n## 單元連勝\n\n";
        ALL_UNITS.forEach(u => {
            md += `- ${cleanTitle(u.title)}：${roundState.streaks[u.id] || 0}\n`;
        });
        md += "\n## 錯題摘要\n\n";
        if (!roundState.mistakes.length) {
            md += "目前沒有錯題紀錄。\n";
        } else {
            roundState.mistakes.slice(-30).forEach((m, i) => {
                md += `${i + 1}. [${m.unitTitle}] ${m.question}\n   - Bobo答：${m.wrong}\n   - 正解：${m.correct}\n`;
            });
        }
        const blob = new Blob([md], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Bobo自然學習報表.md';
        a.click();
    }

    function exportGameMistakes() {
        const json = JSON.stringify(roundState.mistakes || [], null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'bobo-science-mistakes.json';
        a.click();
    }

    window.onload = initPage;
